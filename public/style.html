<style>
    /* --- VARIABLEN (Dark Professional Theme) --- */
    :root {
        --bg-dark: #0f172a;     
        --card-bg: #1e293b;     
        --text-light: #f1f5f9;  
        --text-soft: #94a3b8;   
        --primary-accent: #06b6d4; /* Cyan */
        --secondary-accent: #64748b; 
        --border-dark: #334155;
        --input-bg: #0f172a;    
        --warning: #f59e0b;
        --success: #10b981; 
        --danger: #ef4444;
    }

    * { box-sizing: border-box; }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0; padding: 0;
        background: var(--bg-dark);
        color: var(--text-light);
        font-size: 13px; 
        min-height: 100vh;
    }

    .app-main {
        width: 90%; 
        max-width: 1600px; 
        margin: 0 auto; 
        padding: 20px 0;
    }

    .app-header {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) minmax(280px, 560px) minmax(180px, 1fr);
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
    }
    .app-title {
        text-align: center;
        display: flex; align-items: center; justify-content: center;
    }
    .app-title img {
        display: block;
        width: min(100%, 520px);
        height: auto;
        max-height: 95px;
        filter: brightness(0) invert(1);
    }
    .auth-bar {
        display: none;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        color: var(--text-soft);
        min-width: 0;
    }
    .auth-email {
        max-width: 220px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .logout-btn {
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border-dark);
        border-radius: 6px;
        background: #1e293b;
        color: var(--text-soft);
        cursor: pointer;
    }
    .logout-btn:hover {
        color: var(--text-light);
        border-color: var(--primary-accent);
    }
    @media (max-width: 720px) {
        .app-header { grid-template-columns: 1fr; }
        .auth-bar { justify-content: center; }
        .app-title img { width: min(100%, 420px); max-height: none; }
    }

    /* Navigation */
    .nav-pills {
        background: #1e293b; padding: 3px; border-radius: 6px;
        border: 1px solid var(--border-dark); display: inline-flex; margin-bottom: 20px;
        position: relative; left: 50%; transform: translateX(-50%);
    }
    .nav-pills .nav-link {
        color: var(--text-soft); border-radius: 4px; padding: 5px 15px;
        font-weight: 600; transition: all 0.2s; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; text-decoration: none;
    }
    .nav-pills .nav-link:hover { color: var(--text-light); }
    .nav-pills .nav-link.active { background: var(--primary-accent); color: #fff; box-shadow: 0 2px 5px rgba(6, 182, 212, 0.3); }

    /* --- ADMIN TABS --- */
    .admin-tabs-nav {
        display: flex;
        gap: 8px;
        background: var(--card-bg);
        padding: 8px;
        border-radius: 8px;
        border: 1px solid var(--border-dark);
    }
    .admin-tab-btn {
        flex: 1;
        background: transparent;
        border: 1px solid var(--border-dark);
        color: var(--text-soft);
        padding: 10px 16px;
        border-radius: 6px;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .admin-tab-btn:hover {
        background: rgba(51, 65, 85, 0.5);
        color: var(--text-light);
        border-color: var(--primary-accent);
    }
    .admin-tab-btn.active {
        background: var(--primary-accent);
        color: #fff;
        border-color: var(--primary-accent);
        box-shadow: 0 2px 8px rgba(6, 182, 212, 0.4);
    }
    .admin-tab-content {
        display: none;
        animation: fadeIn 0.3s ease-in-out;
    }
    .admin-tab-content.active {
        display: block;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* --- HEADER (Zentriert) --- */
    .header-panel {
        background: var(--card-bg);
        border: 1px solid var(--border-dark);
        border-radius: 8px;
        padding: 10px 30px;
        margin-bottom: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .header-info { text-align: center; }
    .header-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; }
    .header-sub { font-size: 11px; color: var(--text-soft); }

    /* --- ALLGEMEINE TABELLEN STYLES --- */
    .app-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .app-table th {
        text-align: left; color: var(--primary-accent); font-weight: 800;
        text-transform: uppercase; font-size: 10px; letter-spacing: 1px;
        padding: 8px 15px; border-bottom: 1px solid var(--border-dark);
        background: rgba(15, 23, 42, 0.8);
    }
    .student-row { background-color: var(--card-bg); border-bottom: 1px solid var(--border-dark); }
    .student-row td { padding: 12px 15px; vertical-align: top; }
    .student-row:hover { background-color: rgba(51, 65, 85, 0.3); }

    /* Spaltenbreiten */
    .col-student { width: 220px; } 
    .col-content { width: auto; }

    /* --- FOTO & NAME --- */
    .photo-wrapper {
        width: 70px; height: 85px; 
        border-radius: 6px; border: 1px solid var(--border-dark);
        background: #0f172a; position: relative; overflow: hidden; flex-shrink: 0;
    }
    .photo-loader-overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.6); display: flex; align-items: center; justify-content: center; z-index: 2; transition: opacity 0.3s; }
    .mini-spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--primary-accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .student-name { font-weight: 700; color: #fff; font-size: 15px; line-height: 1.2; margin-bottom: 2px; }
    .student-firstname { color: var(--primary-accent); font-weight: 600; font-size: 13px; }

    /* --- VOTING SPECIFIC STYLES --- */
    .voting-list-container {
        display: flex; flex-direction: column; gap: 4px;
    }
    .vote-item-row {
        display: flex; justify-content: space-between; align-items: center;
        background: #0f172a;
        border: 1px solid var(--border-dark); border-radius: 4px;
        padding: 8px 12px;
        min-height: 45px;
    }
    
    .vote-btn {
        padding: 4px 10px; border-radius: 4px; font-weight: 700; font-size: 11px;
        cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
        border: 1px solid transparent; min-width: 55px; justify-content: center;
        transition: transform 0.1s;
    }
    .vote-btn:active { transform: scale(0.95); }
    .vote-btn-up { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: #065f46; }
    .vote-btn-up.active { background: #10b981; color: #fff; box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
    .vote-btn-down { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: #7f1d1d; }
    .vote-btn-down.active { background: #ef4444; color: #fff; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

    /* --- SEARCH BAR --- */
    .search-container {
        position: relative;
        margin-bottom: 15px;
    }
    .search-input {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--border-dark);
        border-radius: 6px;
        padding: 8px 12px 8px 35px;
        color: var(--text-light);
        font-size: 13px;
        outline: none;
        transition: border-color 0.2s;
    }
    .search-input:focus {
        border-color: var(--primary-accent);
    }
    .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-soft);
        pointer-events: none;
    }

    .search-hint-card {
        background: rgba(15, 23, 42, 0.7);
        border: 1px dashed var(--border-dark);
        border-radius: 6px;
        padding: 12px 16px;
        color: var(--text-soft);
        font-size: 13px;
        text-align: center;
    }
    .search-hint-card.info {
        border-style: solid;
        color: var(--primary-accent);
    }

    .global-search-results {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .global-result-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--card-bg);
        border: 1px solid var(--border-dark);
        border-radius: 6px;
        padding: 10px 14px;
        gap: 12px;
    }
    .global-result-left {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .result-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        overflow: hidden;
        border: 1px solid var(--border-dark);
        background: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: var(--primary-accent);
    }
    .result-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .result-avatar-fallback {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        letter-spacing: 0.5px;
    }
    .result-name { font-weight: 700; color: var(--text-light); }
    .result-meta { font-size: 12px; color: var(--text-soft); }

    .student-row-highlight {
        outline: 2px solid var(--primary-accent);
        box-shadow: 0 0 8px rgba(6, 182, 212, 0.5);
    }

    /* --- PROPOSAL STYLES (Inputs) --- */
    .existing-proposal-box {
        background: #0f172a; border: 1px solid var(--border-dark); border-radius: 4px;
        padding: 6px 10px; margin-bottom: 6px; font-size: 12px;
        display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 6px;
        color: #cbd5e1; line-height: 1.4;
        transition: transform 0.2s, border-color 0.2s;
    }
    
    /* Hide scrollbars from proposals cells - content fits naturally */
    [id^="proposals-cell-"] {
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* IE/Edge */
    }
    [id^="proposals-cell-"]::-webkit-scrollbar {
        display: none; /* Chrome/Safari/Opera */
    }
    .existing-proposal-box:hover {
        transform: translateX(5px);
        border-color: var(--primary-accent);
    }
    .quote-icon { color: var(--primary-accent); margin-right: 8px; opacity: 0.6; font-size: 11px; }
    .user-badge { background: #334155; color: #94a3b8; font-size: 10px; padding: 1px 6px; border-radius: 3px; text-transform: lowercase; margin-right: 6px; }

    /* NEUES INPUT DESIGN (Status-Feedback) */
    .custom-input-group {
        display: flex; align-items: center;
        background: #0f172a; 
        border: 1px solid var(--border-dark);
        border-radius: 6px; 
        margin-bottom: 5px;
        transition: all 0.3s ease;
        position: relative; 
    }
    
    /* STATUS: SPEICHERT (Gelb) */
    .custom-input-group.saving {
        border-color: #f59e0b; /* Warning */
        box-shadow: 0 0 8px rgba(245, 158, 11, 0.2);
    }

    /* STATUS: GESPEICHERT (Grün) */
    .custom-input-group.saved {
        border-color: #10b981; /* Success */
        box-shadow: 0 0 8px rgba(16, 185, 129, 0.2);
    }

    /* STATUS: FEHLER (Rot) */
    .custom-input-group.error {
        border-color: var(--danger);
        box-shadow: 0 0 8px rgba(239, 68, 68, 0.2);
    }

    /* STATUS: KOMMENTAR AUSGEWÄHLT - ENTER ERFORDERLICH (Blau) */
    .custom-input-group.pending-submit {
        border-color: #3b82f6; /* Bright blue */
        box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
        background: #0f172a;
    }
    .custom-input-group.pending-submit .custom-input {
        background: rgba(37, 99, 235, 0.16);
    }
    .custom-input-group.pending-submit .input-status-icon {
        color: #3b82f6;
        animation: pulse-icon 1.5s infinite;
    }
    @keyframes pulse-icon {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
    }
    .enter-hint {
        color: #93c5fd;
        font-size: 11px;
        margin-top: 4px;
        margin-left: 6px;
        font-weight: 600;
        letter-spacing: 0.02em;
    }
    .enter-hint.success {
        color: #86efac;
    }
    .field-error-message {
        color: #fecaca; /* light red */
        font-size: 11px;
        margin-top: 6px;
        padding-left: 6px;
    }
    
    .custom-input { 
        flex: 1;
        background: transparent; border: none; 
        color: var(--text-light); 
        padding: 8px 12px;
        outline: none; font-size: 13px; 
        border-top-left-radius: 6px;
        border-bottom-left-radius: 6px;
    }
    .custom-input::placeholder { color: #475569; font-style: italic; }
    
    /* Rechter Button (Pfeil / Status Icon) */
    .input-status-icon {
        background: transparent; border: none;
        padding: 0 12px;
        display: flex; align-items: center; justify-content: center; height: 100%;
        font-size: 12px;
        color: #475569;
        cursor: pointer;
        width: 40px; 
        border-top-right-radius: 6px;
        border-bottom-right-radius: 6px;
        transition: color 0.2s;
    }
    .input-status-icon:hover { color: var(--text-light); }

    /* --- DATE INPUT STYLES --- */
    input[type="date"] {
        cursor: pointer;
        position: relative;
    }
    
    /* Kalendersymbol heller und besser sichtbar machen */
    input[type="date"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        filter: invert(0.8) brightness(1.5);
        opacity: 1;
        width: 20px;
        height: 20px;
    }
    
    input[type="date"]::-webkit-calendar-picker-indicator:hover {
        filter: invert(1) brightness(2);
        opacity: 1;
    }
    
    /* Firefox */
    input[type="date"]::-moz-calendar-picker-indicator {
        cursor: pointer;
        filter: invert(0.8) brightness(1.5);
        opacity: 1;
    }
    
    /* Farben für Icons im Status-Modus */
    .custom-input-group.saving .input-status-icon { color: #f59e0b; cursor: wait; }
    .custom-input-group.saved .input-status-icon { color: #10b981; cursor: default; }
    .custom-input-group.pending-submit .input-status-icon { color: #3b82f6; cursor: pointer; font-weight: bold; }

    .add-line-btn { color: var(--primary-accent); font-weight: 700; font-size: 11px; background: transparent; border: none; cursor: pointer; padding: 4px 0; display: inline-flex; align-items: center; gap: 4px; opacity: 0.8; }
    .add-line-btn:hover { opacity: 1; text-decoration: underline; }

    /* Dropdown Menü Styles */
    .dropdown-menu {
        max-height: 300px;
        overflow-y: auto;
        overflow-x: hidden;
    }
    
    .dropdown-menu::-webkit-scrollbar { width: 6px; }
    .dropdown-menu::-webkit-scrollbar-track { background: #1e293b; }
    .dropdown-menu::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .dropdown-menu::-webkit-scrollbar-thumb:hover { background: #64748b; }

    /* Admin & Utils */
    .alert-readable { background: rgba(239, 68, 68, 0.15) !important; border: 1px solid #ef4444 !important; color: #fca5a5 !important; }
    .hidden { display: none !important; }
    .text-muted { color: var(--text-soft) !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    div:where(.swal2-container) div:where(.swal2-popup) { border: 1px solid var(--border-dark); background: #1e293b; color: #f1f5f9; }
</style>
