// Hilfsfunktion: Text sicher für HTML konvertieren
function escapeHtml(input) {
  if (input === null || input === undefined) return '';
  return String(input)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function normalizeCommentsList(data) {
  const normalized = (Array.isArray(data) ? data : []).map(c => {
    const category = c.category || c.kategorie || c.Kategorie || 'Allgemein';
    let num = c.num || null;
    if (!num && c.text) {
      const text = c.text.toLowerCase().replace(/\s+/g, ' ');
      if (text.includes("konzentrieren")) num = "001";
      else if (text.includes("sorgfältig erledigen") || text.includes("sorgfältig zu erledigen")) num = "002";
      else if (text.includes("lernerfolg")) num = "003";
      else if (text.includes("teamarbeit")) num = "004";
      else if (text.includes("mappenführung einhalten")) num = "008";
      else if (text.match(/hausaufgaben.*sorgfältig/)) num = "009";
      else if (text.includes("leserliche schreibweise")) num = "010";
      else if (text.includes("materialien mit zum unterricht")) num = "011";
      else if (text.includes("schulordnung")) num = "012";
      else if (text.includes("klasseregeln") || text.includes("teamregeln")) num = "013";
      else if (text.includes("respektvoll") && text.includes("friedlich")) num = "014";
      else if (text.includes("konflikte aushalten")) num = "015";
      else if (text.includes("geforderte maß hinaus")) num = "017";
      else if (text.includes("konzentriert und aktiv")) num = "018";
      else if (text.includes("kreative ideen")) num = "019";
      else if (text.includes("mappenführung ist vorbildlich")) num = "020";
      else if (text.includes("mitschülern") && text.includes("helfen")) num = "021";
      else if (text.includes("konstruktive lösungen in konflikten")) num = "022";
      else if (text.includes("problemlösungen zu finden")) num = "024";
      else if (text.includes("mitarbeit") && text.includes("aufmerksamkeit")) num = "025";
      else if (text.includes("packen der schultasche")) num = "050";
      else if (text.includes("anfertigen der hausaufgaben")) num = "051";
      else if (text.includes("freiwillig aufgaben")) num = "101";
      else if (text.includes("klassensprecher")) num = "102";
      else if (text.includes("sv mitgearbeitet")) num = "103";
      else if (text.includes("tanz-ag")) num = "104";
      else if (text.includes("musikanlage betreut")) num = "105";
      else if (text.includes("gitarren-ag")) num = "106";
      else if (text.includes("spielzeugausleihe")) num = "110";
      else if (text.includes("streitschlichter")) num = "111";
      else if (text.includes("pünktlich zum unterricht")) num = "201";
      else if (text.includes("schriftlichen verweis")) num = "202";
      else if (text.includes("erprobungsstufe")) num = "203";
      else if (text.includes("teilkonferenz stattgefunden")) num = "204";
      else if (text.includes("hauptschule") || text.includes("gesamtschule")) num = "205";
      else if (text.includes("wiederholung der jahrgangsstufe 6")) num = "206";
      else if (text.includes("nicht benotet werden") || text.includes("nicht benotet werden konnte")) num = "207";
      else if (text.includes("schülerbetriebspraktikum absolviert")) num = "208";
      else if (text.includes("berufsorientierungsunterricht teilgenommen")) {
         if (text.includes("besonderem engagement")) num = "211";
         else if (text.includes("mit engagement")) num = "210";
         else num = "209";
      }
      else if (text.includes("delf") && text.includes("a1")) num = "213";
      else if (text.includes("delf") && text.includes("a2")) num = "214";
      else if (text.includes("überweisungszeugnis")) num = "215";
      else if (text.includes("praktikumshefter")) num = "241";
    }
    return { ...c, category, kategorie: category, num };
  });
  console.log('Normalized comments with nums:', normalized.filter(c => c.num));
  return normalized;
}

function loadCommentsDict() {
  // Nur laden, wenn noch nicht geladen
  if (globalComments && globalComments.length > 0) return Promise.resolve(globalComments);
  if (commentsLoadingPromise) return commentsLoadingPromise;
  commentsLoadingPromise = runServer('getAvailableComments', null)
    .then(d => {
      globalComments = normalizeCommentsList(d);
      commentsLoadingPromise = null;
      return globalComments;
    })
    .catch(err => {
      commentsLoadingPromise = null;
      throw err;
    });
  return commentsLoadingPromise;
}

// --- HELPER: MODERN MESSAGE MODAL ---
function showMessage(title, text, type = 'success') {
  Swal.fire({
    title: title, html: text, icon: type,
    background: '#1e293b', color: '#f1f5f9', confirmButtonColor: '#06b6d4', heightAuto: false 
  });
}

// --- STATUS BAR (Unten rechts) ---
function showStatus(state, msg) {
    const bar = document.getElementById('status-bar');
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    
    if(!bar) return; // Falls View gewechselt wurde
    
    bar.classList.add('visible');
    dot.className = 'status-dot ' + state;
    txt.innerText = msg;
    
    if (state === 'saved') {
        setTimeout(() => { 
            if(bar) bar.classList.remove('visible'); 
        }, 2000);
    }
}

// --- NAVIGATION & AUTH CHECK ---
async function switchView(view) {
  // Aktiven Tab setzen
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  
  if (view === 'admin') {
    // Bootstrap Modal verwenden - KEIN SweetAlert mehr!
    const modal = new bootstrap.Modal(document.getElementById('adminLoginModal'));
    const passwordInput = document.getElementById('adminPasswordInput');
    const loginBtn = document.getElementById('adminLoginBtn');
    const errorDiv = document.getElementById('adminPasswordError');
    const closeBtn = document.getElementById('adminModalCloseBtn');
    
    // Reset
    passwordInput.value = '';
    errorDiv.style.display = 'none';
    loginBtn.disabled = false;
    
    // Modal öffnen
    modal.show();
    
    // Focus auf Passwort-Feld
    setTimeout(() => passwordInput.focus(), 300);
    
    // Enter-Taste im Passwort-Feld
    const enterHandler = (e) => {
      if (e.key === 'Enter') loginBtn.click();
    };
    passwordInput.addEventListener('keypress', enterHandler);
    
    // Login-Button Click
    const loginHandler = async () => {
      const password = passwordInput.value;
      
      if (!password) {
        errorDiv.textContent = 'Bitte Passwort eingeben';
        errorDiv.style.display = 'block';
        return;
      }
      
      // Button deaktivieren während Prüfung
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Prüfe...';
      
      try {
        const isValid = await runServer('verifyAdminPassword', password);
        
        if (isValid) {
          // SOFORT Modal schließen und UI anzeigen (kein Warten auf Server-Calls!)
          modal.hide();
          document.getElementById('nav-admin').classList.add('active');
          
          // Admin-View sofort mit Lade-Spinner anzeigen (nicht blockierend!)
          const appContent = document.getElementById('app-content');
          appContent.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div><p class="mt-3 text-muted">Lade Admin-Bereich...</p></div>';
          
          // Echtes Admin-Interface asynchron im Hintergrund laden
          setTimeout(() => renderAdminView(appContent), 10);
          
        } else {
          // Fehler anzeigen
          errorDiv.textContent = 'Falsches Passwort!';
          errorDiv.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Anmelden';
          passwordInput.select();
        }
      } catch (error) {
        errorDiv.textContent = 'Fehler: ' + error;
        errorDiv.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Anmelden';
      }
    };
    
    loginBtn.addEventListener('click', loginHandler, { once: true });
    
    // Cleanup wenn Modal geschlossen wird
    document.getElementById('adminLoginModal').addEventListener('hidden.bs.modal', () => {
      passwordInput.removeEventListener('keypress', enterHandler);
      // Wenn Modal ohne Erfolg geschlossen -> zurück zu Lehrer
      if (!document.getElementById('nav-admin').classList.contains('active')) {
        document.getElementById('nav-teacher').classList.add('active');
      }
    }, { once: true });
    
    return; // Wichtig: Nicht weiter ausführen
    
  } else if (view === 'teacher') {
    // Lehrer Bereich (Kein Passwort)
    document.getElementById('nav-teacher').classList.add('active');
    renderTeacherView(document.getElementById('app-content'));
  }
}

// Hilfsfunktion für Promises (Server Calls)
function runServer(funcName, data) {
    return new Promise((resolve, reject) => {
        google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            [funcName](data);
    });
}


// --- ADMIN: INDEX NEU AUFBAUEN ---
function rebuildIndexes() {
  Swal.fire({
    title: 'Index neu aufbauen?',
    text: 'Das kann einige Sekunden dauern. Fortfahren?',
    icon: 'warning',
    showCancelButton: true,
    confirmButtonText: 'Ja, starten',
    cancelButtonText: 'Abbrechen',
    background: '#1e293b',
    color: '#f1f5f9',
    confirmButtonColor: '#06b6d4',
    heightAuto: false
  }).then((result) => {
    if (result.isConfirmed) {
      google.script.run.withSuccessHandler(function(res) {
        showMessage('Index neu aufgebaut', '<pre>' + JSON.stringify(res, null, 2) + '</pre>', 'success');
      }).rebuildIndexes();
    }
  });
}
