<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360">
  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g transform="translate(20, 30)">
    <!-- Hintergrund-Kreis mit modernem Design -->
    <circle cx="130" cy="110" r="110" fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.2"/>
    <circle cx="130" cy="110" r="95" fill="#0f172a" stroke="#06b6d4" stroke-width="2.5"/>
    
    <!-- Dokument-Icon (modern & clean) -->
    <g transform="translate(75, 45)">
      <!-- Dokumentrahmen -->
      <rect x="0" y="0" width="110" height="135" rx="8" fill="none" stroke="#06b6d4" stroke-width="3"/>
      
      <!-- Linien des Dokuments -->
      <line x1="15" y1="20" x2="95" y2="20" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="15" y1="35" x2="95" y2="35" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="15" y1="50" x2="80" y2="50" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
      
      <!-- Checkmark (Symbol für "einfach") -->
      <g transform="translate(55, 85)">
        <path d="M -18 0 L -8 12 L 18 -8" fill="none" stroke="#10b981" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- Text: Zeugnisbemerkungen -->
    <text x="260" y="115" font-family="'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#f1f5f9">Zeugnisbemerkungen</text>
    
    <!-- FSR Badge -->
    <rect x="260" y="145" width="130" height="60" rx="12" fill="#06b6d4" />
    <text x="285" y="190" font-family="'Segoe UI', sans-serif" font-size="38" font-weight="700" fill="#0f172a">FSR</text>
    
    <!-- Subtext: endlich einfach -->
    <text x="410" y="190" font-family="'Segoe UI', sans-serif" font-size="32" font-weight="500" fill="#94a3b8">endlich einfach</text>
  </g>
</svg>
