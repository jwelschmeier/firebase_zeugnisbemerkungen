function isDateInRange(checkDate, text) {
  if (!checkDate || !text) return false;
  const regex = /(\d{1,2})\.(\d{1,2})\.(\d{2,4})/g;
  const matches = [...text.matchAll(regex)];
  if (matches.length < 2) return false;
  
  const [d1, m1, y1] = [parseInt(matches[0][1]), parseInt(matches[0][2]), parseInt(matches[0][3])];
  const [d2, m2, y2] = [parseInt(matches[1][1]), parseInt(matches[1][2]), parseInt(matches[1][3])];
  
  const start = new Date(y1 < 100 ? 2000 + y1 : y1, m1 - 1, d1);
  const end = new Date(y2 < 100 ? 2000 + y2 : y2, m2 - 1, d2);
  
  return checkDate >= start && checkDate <= end;
}

function parseGermanDate(dateStr) {
  if (!dateStr) return '';
  const parts = dateStr.split('.');
  if (parts.length !== 3) return '';
  return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
}

function formatToGermanDate(isoDate) {
  if (!isoDate) return '';
  const parts = isoDate.split('-');
  if (parts.length !== 3) return '';
  return `${parts[2]}.${parts[1]}.${parts[0]}`;
}

function initializeDatePickers(proposalDesc, votingDesc) {
  const propMatch = proposalDesc.match(/(\d{2}\.\d{2}\.\d{4})\s*-\s*(\d{2}\.\d{2}\.\d{4})/);
  if (propMatch) {
    const propStart = document.getElementById('propStartDate');
    const propEnd = document.getElementById('propEndDate');
    if (propStart) propStart.value = parseGermanDate(propMatch[1]);
    if (propEnd) propEnd.value = parseGermanDate(propMatch[2]);
  }
  
  const voteMatch = votingDesc.match(/(\d{2}\.\d{2}\.\d{4})\s*-\s*(\d{2}\.\d{2}\.\d{4})/);
  if (voteMatch) {
    const voteStart = document.getElementById('voteStartDate');
    const voteEnd = document.getElementById('voteEndDate');
    if (voteStart) voteStart.value = parseGermanDate(voteMatch[1]);
    if (voteEnd) voteEnd.value = parseGermanDate(voteMatch[2]);
  }
  
  const propStart = document.getElementById('propStartDate');
  const propEnd = document.getElementById('propEndDate');
  const voteStart = document.getElementById('voteStartDate');
  const voteEnd = document.getElementById('voteEndDate');
  
  function updateProposalText() {
    const start = propStart ? propStart.value : '';
    const end = propEnd ? propEnd.value : '';
    const descProp = document.getElementById('descProp');
    if (!descProp) return;
    
    if (!start && !end) {
      descProp.value = '';
      console.log('[updateProposalText] Beide Felder leer - Textfeld geleert');
      return;
    }
    
    if (start && end) {
      descProp.value = `${formatToGermanDate(start)} - ${formatToGermanDate(end)}`;
      console.log('[updateProposalText] Textfeld aktualisiert:', descProp.value);
    }
  }
  
  function updateVotingText() {
    const start = voteStart ? voteStart.value : '';
    const end = voteEnd ? voteEnd.value : '';
    const descVote = document.getElementById('descVote');
    if (!descVote) return;
    
    if (!start && !end) {
      descVote.value = '';
      console.log('[updateVotingText] Beide Felder leer - Textfeld geleert');
      return;
    }
    
    if (start && end) {
      descVote.value = `${formatToGermanDate(start)} - ${formatToGermanDate(end)}`;
      console.log('[updateVotingText] Textfeld aktualisiert:', descVote.value);
    }
  }
  
  if (propStart) propStart.addEventListener('change', updateProposalText);
  if (propEnd) propEnd.addEventListener('change', updateProposalText);
  if (voteStart) voteStart.addEventListener('change', updateVotingText);
  if (voteEnd) voteEnd.addEventListener('change', updateVotingText);
}

  const selectedTab = document.getElementById('tab-' + tabName);

}

function setPhase(phaseName) {
  // Client-Cache löschen
  localStorage.removeItem('classData');
  localStorage.removeItem('currentClassName');
  
  // Spinner-Cursor aktivieren
  document.body.style.cursor = 'wait';
  
  runServer('setAppPhase', phaseName)
  .then(res => {
    // Cursor zurücksetzen
    document.body.style.cursor = 'default';
    
    if (res && res.success) {
      showMessage("Phase geändert", `Phase wurde manuell auf ${phaseName} gesetzt. Die Automatik ist jetzt deaktiviert.`, "success");
      setTimeout(() => {
        // Admin-View neu laden
        renderAdminView(document.getElementById('app-content'));
        // Falls Teacher-View aktiv ist, auch neu laden
        if (typeof refreshCurrentClass === 'function') {
          refreshCurrentClass();
        }
      }, 1000);
    } else {
      showMessage("Fehler", res && res.message ? res.message : "Unbekannter Fehler", "error");
    }
  })
  .catch(err => {
    // Cursor auch bei Fehler zurücksetzen
    document.body.style.cursor = 'default';
    showMessage("Fehler", "Verbindungsfehler: " + err, "error");
  });
}

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = (e) => reject(e);
    reader.readAsText(file);
  });
}

function addStudentManually() {
  const vorname = document.getElementById('newStudentVorname').value.trim();
  const nachname = document.getElementById('newStudentNachname').value.trim();
  const klasse = document.getElementById('newStudentKlasse').value.trim();
  const photoFile = document.getElementById('newStudentPhoto').files[0];
  const stat = document.getElementById('addStudentStat');
  
  if (!vorname || !nachname || !klasse) {
    showMessage("Fehler", "Bitte alle Pflichtfelder ausfüllen.", "error");
    return;
  }
  
  stat.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Füge hinzu...';
  
  if (photoFile) {
    readFileAsBase64(photoFile).then(base64Data => {
      return runServer('addStudent', {
        vorname: vorname,
        nachname: nachname,
        klasse: klasse,
        photoData: base64Data,
        photoName: photoFile.name
      });
    })
    .then(handleAddStudentResponse)
    .catch(err => {
      stat.innerHTML = '<span class="text-danger">Fehler</span>';
      showMessage("Fehler", String(err), "error");
    });
  } else {
    runServer('addStudent', {
      vorname: vorname,
      nachname: nachname,
      klasse: klasse
    })
    .then(handleAddStudentResponse)
    .catch(err => {
      stat.innerHTML = '<span class="text-danger">Fehler</span>';
      showMessage("Fehler", String(err), "error");
    });
  }
}

function handleAddStudentResponse(res) {
  const stat = document.getElementById('addStudentStat');
  if (res && res.success) {
    stat.innerHTML = '<span class="text-success">✅ Hinzugefügt!</span>';
    document.getElementById('newStudentVorname').value = '';
    document.getElementById('newStudentNachname').value = '';
    document.getElementById('newStudentKlasse').value = '';
    document.getElementById('newStudentPhoto').value = '';
    showMessage("Erfolg", res.message || "Schüler hinzugefügt.", "success");
  } else {
    stat.innerHTML = '<span class="text-danger">❌ Fehler</span>';
    showMessage("Fehler", res && res.message ? res.message : "Unbekannter Fehler", "error");
  }
}

function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = (e) => reject(e);
    reader.readAsDataURL(file);
  });
}

  const list = document.getElementById('studentManagementList');

  const timeout = new Promise((_, reject) =>

  );

  Promise.race([runServer('getAllStudents', null), timeout])
  .then(result => {

      list.innerHTML = `<div class="text-danger text-center py-4"><i class="fa-solid fa-circle-exclamation me-2"></i>Fehler: ${msg}</div>`;

    selectedStudentIds.clear();

      const checkId = `check-${s.id}`;
      html += `

          <input type="checkbox" class="form-check-input me-3" id="${checkId}"
                 onchange="toggleStudentSelection('${s.id}')">
          <label class="form-check-label flex-grow-1 text-light small" for="${checkId}">
            ${s.klasse} - ${s.nachname}, ${s.vorname}
          </label>
        </div>
      `;
    });
    html += '</div>';

    list.innerHTML = html;

    document.getElementById('selectAllBtn').disabled = false;
    document.getElementById('deselectAllBtn').disabled = false;
  })
  .catch(err => {
    list.innerHTML = `<div class="text-danger text-center py-4"><i class="fa-solid fa-circle-exclamation me-2"></i>${err.message || err}</div>`;
  });
}

function toggleStudentSelection(studentId) {
  const checkbox = document.getElementById('check-' + studentId);
  if (checkbox && checkbox.checked) {
    selectedStudentIds.add(studentId);
  } else {
    selectedStudentIds.delete(studentId);
  }
  
  document.getElementById('deleteProposalsBtn').disabled = selectedStudentIds.size === 0;
  document.getElementById('resetVotesBtn').disabled = selectedStudentIds.size === 0;
}

function selectAllStudents() {
  document.querySelectorAll('#studentManagementList input[type="checkbox"]').forEach(cb => {
    cb.checked = true;
    const id = cb.id.replace('check-', '');
    selectedStudentIds.add(id);
  });
  
  document.getElementById('deleteProposalsBtn').disabled = false;
  document.getElementById('resetVotesBtn').disabled = false;
}

function deselectAllStudents() {
  document.querySelectorAll('#studentManagementList input[type="checkbox"]').forEach(cb => {
    cb.checked = false;
  });
  selectedStudentIds.clear();
  
  document.getElementById('deleteProposalsBtn').disabled = true;
  document.getElementById('resetVotesBtn').disabled = true;
}

function deleteProposalsForSelected() {
  if (selectedStudentIds.size === 0) return;
  
  const count = selectedStudentIds.size;
  const names = Array.from(selectedStudentIds).slice(0, 3).join(', ') + (count > 3 ? '...' : '');
  
  Swal.fire({
    title: 'Bemerkungen löschen?',
    html: `<p>Alle Bemerkungen von <strong>${count} Schüler${count !== 1 ? 'n' : ''}</strong> werden gelöscht:</p>
           <p class="text-muted small">${names}</p>`,
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#ef4444',
    cancelButtonColor: '#64748b',
    confirmButtonText: 'Ja, löschen',
    cancelButtonText: 'Abbrechen',
    background: '#1e293b',
    color: '#f1f5f9'
  }).then((result) => {
    if (result.isConfirmed) {
      const statDiv = document.getElementById('managementStat');
      statDiv.innerHTML = '<span class="text-info"><i class="fa-solid fa-spinner fa-spin me-2"></i>Lösche...</span>';
      
      runServer('deleteProposalsForStudents', Array.from(selectedStudentIds))
      .then(res => {
        if (res && res.success) {
          statDiv.innerHTML = `<span class="text-success"><i class="fa-solid fa-check me-2"></i>${res.message}</span>`;
          setTimeout(() => loadStudentsForManagement(), 1500);
        } else {
          statDiv.innerHTML = `<span class="text-danger"><i class="fa-solid fa-exclamation-triangle me-2"></i>${res.message}</span>`;
        }
      })
      .catch(err => {
        statDiv.innerHTML = `<span class="text-danger">Fehler: ${err}</span>`;
      });
    }
  });
}

function resetVotesForSelected() {
  if (selectedStudentIds.size === 0) return;
  
  const count = selectedStudentIds.size;
  const names = Array.from(selectedStudentIds).slice(0, 3).join(', ') + (count > 3 ? '...' : '');
  
  Swal.fire({
    title: 'Abstimmungen zurücksetzen?',
    html: `<p>Alle Abstimmungsergebnisse von <strong>${count} Schüler${count !== 1 ? 'n' : ''}</strong> werden gelöscht:</p>
           <p class="text-muted small">${names}</p>
           <p class="text-warning mt-3"><i class="fa-solid fa-info-circle me-2"></i>Die Bemerkungen bleiben erhalten, nur die Votes werden entfernt.</p>`,
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#f59e0b',
    cancelButtonColor: '#64748b',
    confirmButtonText: 'Ja, zurücksetzen',
    cancelButtonText: 'Abbrechen',
    background: '#1e293b',
    color: '#f1f5f9'
  }).then((result) => {
    if (result.isConfirmed) {
      const statDiv = document.getElementById('managementStat');
      statDiv.innerHTML = '<span class="text-info"><i class="fa-solid fa-spinner fa-spin me-2"></i>Setze zurück...</span>';
      
      runServer('resetVotesForStudents', Array.from(selectedStudentIds))
      .then(res => {
        if (res && res.success) {
          statDiv.innerHTML = `<span class="text-success"><i class="fa-solid fa-check me-2"></i>${res.message}</span>`;
          setTimeout(() => loadStudentsForManagement(), 1500);
        } else {
          statDiv.innerHTML = `<span class="text-danger"><i class="fa-solid fa-exclamation-triangle me-2"></i>${res.message}</span>`;
        }
      })
      .catch(err => {
        statDiv.innerHTML = `<span class="text-danger">Fehler: ${err}</span>`;
      });
    }
  });
}

function deleteAllProposals() {
  Swal.fire({
    title: 'ALLE Vorschläge löschen?',
    html: '<p>Diese Aktion löscht <strong>sämtliche</strong> Vorschläge und Votes aller Schüler unwiderruflich.</p><p class="text-warning mt-2">Nur sinnvoll nach einem Neu-Import oder zum Saisonstart.</p>',
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#ef4444',
    cancelButtonColor: '#64748b',
    confirmButtonText: 'Ja, alles löschen',
    cancelButtonText: 'Abbrechen',
    background: '#1e293b',
    color: '#f1f5f9'
  }).then((result) => {
    if (result.isConfirmed) {
      const statDiv = document.getElementById('managementStat');
      statDiv.innerHTML = '<span class="text-info"><i class="fa-solid fa-spinner fa-spin me-2"></i>Lösche alle Vorschläge...</span>';
      runServer('deleteAllProposals', null)
      .then(res => {
        if (res && res.success) {
          // localStorage-Cache leeren (ProposalsCore speichert unter "class_cache_*")
          try {
            Object.keys(localStorage)
              .filter(k => k.startsWith('class_cache_'))
              .forEach(k => localStorage.removeItem(k));
          } catch (e) {}
          statDiv.innerHTML = `<span class="text-success"><i class="fa-solid fa-check me-2"></i>${res.message} Browser-Cache geleert.</span>`;
        } else {
          statDiv.innerHTML = `<span class="text-danger"><i class="fa-solid fa-exclamation-triangle me-2"></i>${res && res.message ? res.message : 'Fehler'}</span>`;
        }
      })
      .catch(err => {
        statDiv.innerHTML = `<span class="text-danger">Fehler: ${err}</span>`;
      });
    }
  });
}

function runPhotoSync() {
  const stat = document.getElementById('syncStat');
  if (stat) stat.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Suche Fotos...';

  runServer('syncPhotosToDatabase', null)
  .then(res => {
    if (res && res.success) {
      if (stat) stat.innerHTML = '<span class="text-success">✅ ' + (res.message || "OK") + '</span>';
      showMessage("Sync erfolgreich", res.message || "OK", "success");
    } else {
      if (stat) stat.innerHTML = '<span class="text-danger">❌ Fehler</span>';
      showMessage("Sync Fehler", (res && res.message) ? res.message : "Unbekannter Fehler", "error");
    }
  })
  .catch(err => {
    if (stat) stat.innerHTML = '<span class="text-danger">❌ Fehler</span>';
    showMessage("Sync Fehler", String(err), "error");
  });
}

function rebuildIndexes() {
  Swal.fire({
    title: 'Index neu aufbauen?',
    text: 'Dies kann einige Minuten dauern.',
    icon: 'question',
    showCancelButton: true,
    confirmButtonColor: '#06b6d4',
    cancelButtonColor: '#64748b',
    confirmButtonText: 'Ja, aufbauen',
    cancelButtonText: 'Abbrechen',
    background: '#1e293b',
    color: '#f1f5f9'
  }).then((result) => {
    if (result.isConfirmed) {
      runServer('rebuildIndexes', null)
      .then(res => {
        if (res && res.success) {
          showMessage("Erfolg", "Index wurde neu aufgebaut.", "success");
        } else {
          showMessage("Fehler", res && res.message ? res.message : "Unbekannter Fehler", "error");
        }
      })
      .catch(err => {
        showMessage("Fehler", String(err), "error");
      });
    }
  });
}
</script>
