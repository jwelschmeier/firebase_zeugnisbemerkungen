<!DOCTYPE html>
<html>
  <head>
        <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zeugnisbemerkungen FS</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" media="print" onload="this.media='all'">
    
    <style>
    /* --- VARIABLEN (Dark Professional Theme) --- */
    :root {
        --bg-dark: #0f172a;     
        --card-bg: #1e293b;     
        --text-light: #f1f5f9;  
        --text-soft: #94a3b8;   
        --primary-accent: #06b6d4; /* Cyan */
        --secondary-accent: #64748b; 
        --border-dark: #334155;
        --input-bg: #0f172a;    
        --warning: #f59e0b;
        --success: #10b981; 
        --danger: #ef4444;
    }

    * { box-sizing: border-box; }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0; padding: 0;
        background: var(--bg-dark);
        color: var(--text-light);
        font-size: 13px; 
        min-height: 100vh;
    }

    .app-main {
        width: 90%; 
        max-width: 1600px; 
        margin: 0 auto; 
        padding: 20px 0;
    }

    .app-header {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) minmax(280px, 560px) minmax(180px, 1fr);
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
    }
    .app-title {
        text-align: center;
        display: flex; align-items: center; justify-content: center;
    }
    .app-title img {
        display: block;
        width: min(100%, 650px);
        height: auto;
        max-height: 120px;
        object-fit: contain;
    }
    .auth-bar {
        display: none;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        color: var(--text-soft);
        min-width: 0;
    }
    .auth-email {
        max-width: 220px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .logout-btn {
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border-dark);
        border-radius: 6px;
        background: #1e293b;
        color: var(--text-soft);
        cursor: pointer;
    }
    .logout-btn:hover {
        color: var(--text-light);
        border-color: var(--primary-accent);
    }
    @media (max-width: 720px) {
        .app-header { grid-template-columns: 1fr; }
        .auth-bar { justify-content: center; }
        .app-title img { width: min(100%, 420px); max-height: none; }
    }

    /* Navigation */
    .nav-pills {
        background: #1e293b; padding: 3px; border-radius: 6px;
        border: 1px solid var(--border-dark); display: inline-flex; margin-bottom: 20px;
        position: relative; left: 50%; transform: translateX(-50%);
    }
    .nav-pills .nav-link {
        color: var(--text-soft); border-radius: 4px; padding: 5px 15px;
        font-weight: 600; transition: all 0.2s; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; text-decoration: none;
    }
    .nav-pills .nav-link:hover { color: var(--text-light); }
    .nav-pills .nav-link.active { background: var(--primary-accent); color: #fff; box-shadow: 0 2px 5px rgba(6, 182, 212, 0.3); }

    /* --- ADMIN TABS --- */
    .admin-tabs-nav {
        display: flex;
        gap: 8px;
        background: var(--card-bg);
        padding: 8px;
        border-radius: 8px;
        border: 1px solid var(--border-dark);
    }
    .admin-tab-btn {
        flex: 1;
        background: transparent;
        border: 1px solid var(--border-dark);
        color: var(--text-soft);
        padding: 10px 16px;
        border-radius: 6px;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .admin-tab-btn:hover {
        background: rgba(51, 65, 85, 0.5);
        color: var(--text-light);
        border-color: var(--primary-accent);
    }
    .admin-tab-btn.active {
        background: var(--primary-accent);
        color: #fff;
        border-color: var(--primary-accent);
        box-shadow: 0 2px 8px rgba(6, 182, 212, 0.4);
    }
    .admin-tab-content {
        display: none;
        animation: fadeIn 0.3s ease-in-out;
    }
    .admin-tab-content.active {
        display: block;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* --- HEADER (Zentriert) --- */
    .header-panel {
        background: var(--card-bg);
        border: 1px solid var(--border-dark);
        border-radius: 8px;
        padding: 10px 30px;
        margin-bottom: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .header-info { text-align: center; }
    .header-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; }
    .header-sub { font-size: 11px; color: var(--text-soft); }

    /* --- ALLGEMEINE TABELLEN STYLES --- */
    .app-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .app-table th {
        text-align: left; color: var(--primary-accent); font-weight: 800;
        text-transform: uppercase; font-size: 10px; letter-spacing: 1px;
        padding: 8px 15px; border-bottom: 1px solid var(--border-dark);
        background: rgba(15, 23, 42, 0.8);
    }
    .student-row { background-color: var(--card-bg); border-bottom: 1px solid var(--border-dark); }
    .student-row td { padding: 12px 15px; vertical-align: top; }
    .student-row:hover { background-color: rgba(51, 65, 85, 0.3); }

    /* Spaltenbreiten */
    .col-student { width: 220px; } 
    .col-content { width: auto; }

    /* --- FOTO & NAME --- */
    .photo-wrapper {
        width: 70px; height: 85px; 
        border-radius: 6px; border: 1px solid var(--border-dark);
        background: #0f172a; position: relative; overflow: hidden; flex-shrink: 0;
    }
    .photo-loader-overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.6); display: flex; align-items: center; justify-content: center; z-index: 2; transition: opacity 0.3s; }
    .mini-spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--primary-accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .student-name { font-weight: 700; color: #fff; font-size: 15px; line-height: 1.2; margin-bottom: 2px; }
    .student-firstname { color: var(--primary-accent); font-weight: 600; font-size: 13px; }

    /* --- VOTING SPECIFIC STYLES --- */
    .voting-list-container {
        display: flex; flex-direction: column; gap: 4px;
    }
    .vote-item-row {
        display: flex; justify-content: space-between; align-items: center;
        background: #0f172a;
        border: 1px solid var(--border-dark); border-radius: 4px;
        padding: 8px 12px;
        min-height: 45px;
    }
    
    .vote-btn {
        padding: 4px 10px; border-radius: 4px; font-weight: 700; font-size: 11px;
        cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
        border: 1px solid transparent; min-width: 55px; justify-content: center;
        transition: transform 0.1s;
    }
    .vote-btn:active { transform: scale(0.95); }
    .vote-btn-up { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: #065f46; }
    .vote-btn-up.active { background: #10b981; color: #fff; box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
    .vote-btn-down { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: #7f1d1d; }
    .vote-btn-down.active { background: #ef4444; color: #fff; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

    /* --- SEARCH BAR --- */
    .search-container {
        position: relative;
        margin-bottom: 15px;
    }
    .search-input {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--border-dark);
        border-radius: 6px;
        padding: 8px 12px 8px 35px;
        color: var(--text-light);
        font-size: 13px;
        outline: none;
        transition: border-color 0.2s;
    }
    .search-input:focus {
        border-color: var(--primary-accent);
    }
    .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-soft);
        pointer-events: none;
    }

    .search-hint-card {
        background: rgba(15, 23, 42, 0.7);
        border: 1px dashed var(--border-dark);
        border-radius: 6px;
        padding: 12px 16px;
        color: var(--text-soft);
        font-size: 13px;
        text-align: center;
    }
    .search-hint-card.info {
        border-style: solid;
        color: var(--primary-accent);
    }

    .global-search-results {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .global-result-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--card-bg);
        border: 1px solid var(--border-dark);
        border-radius: 6px;
        padding: 10px 14px;
        gap: 12px;
    }
    .global-result-left {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .result-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        overflow: hidden;
        border: 1px solid var(--border-dark);
        background: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: var(--primary-accent);
    }
    .result-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .result-avatar-fallback {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        letter-spacing: 0.5px;
    }
    .result-name { font-weight: 700; color: var(--text-light); }
    .result-meta { font-size: 12px; color: var(--text-soft); }

    .student-row-highlight {
        outline: 2px solid var(--primary-accent);
        box-shadow: 0 0 8px rgba(6, 182, 212, 0.5);
    }

    /* --- PROPOSAL STYLES (Inputs) --- */
    .existing-proposal-box {
        background: #0f172a; border: 1px solid var(--border-dark); border-radius: 4px;
        padding: 6px 10px; margin-bottom: 6px; font-size: 12px;
        display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 6px;
        color: #cbd5e1; line-height: 1.4;
        transition: transform 0.2s, border-color 0.2s;
    }
    
    /* Hide scrollbars from proposals cells - content fits naturally */
    [id^="proposals-cell-"] {
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* IE/Edge */
    }
    [id^="proposals-cell-"]::-webkit-scrollbar {
        display: none; /* Chrome/Safari/Opera */
    }
    .existing-proposal-box:hover {
        transform: translateX(5px);
        border-color: var(--primary-accent);
    }
    .quote-icon { color: var(--primary-accent); margin-right: 8px; opacity: 0.6; font-size: 11px; }
    .user-badge { background: #334155; color: #94a3b8; font-size: 10px; padding: 1px 6px; border-radius: 3px; text-transform: lowercase; margin-right: 6px; }

    /* NEUES INPUT DESIGN (Status-Feedback) */
    .custom-input-group {
        display: flex; align-items: center;
        background: #0f172a; 
        border: 1px solid var(--border-dark);
        border-radius: 6px; 
        margin-bottom: 5px;
        transition: all 0.3s ease;
        position: relative; 
    }
    
    /* STATUS: SPEICHERT (Gelb) */
    .custom-input-group.saving {
        border-color: #f59e0b; /* Warning */
        box-shadow: 0 0 8px rgba(245, 158, 11, 0.2);
    }

    /* STATUS: GESPEICHERT (Grün) */
    .custom-input-group.saved {
        border-color: #10b981; /* Success */
        box-shadow: 0 0 8px rgba(16, 185, 129, 0.2);
    }

    /* STATUS: FEHLER (Rot) */
    .custom-input-group.error {
        border-color: var(--danger);
        box-shadow: 0 0 8px rgba(239, 68, 68, 0.2);
    }
    .field-error-message {
        color: #fecaca; /* light red */
        font-size: 11px;
        margin-top: 6px;
        padding-left: 6px;
    }
    
    .custom-input { 
        flex: 1;
        background: transparent; border: none; 
        color: var(--text-light); 
        padding: 8px 12px;
        outline: none; font-size: 13px; 
        border-top-left-radius: 6px;
        border-bottom-left-radius: 6px;
    }
    .custom-input::placeholder { color: #475569; font-style: italic; }
    
    /* Rechter Button (Pfeil / Status Icon) */
    .input-status-icon {
        background: transparent; border: none;
        padding: 0 12px;
        display: flex; align-items: center; justify-content: center; height: 100%;
        font-size: 12px;
        color: #475569;
        cursor: pointer;
        width: 40px; 
        border-top-right-radius: 6px;
        border-bottom-right-radius: 6px;
        transition: color 0.2s;
    }
    .input-status-icon:hover { color: var(--text-light); }
    
    /* --- DATE INPUT STYLES --- */
    input[type="date"] {
        cursor: pointer;
        position: relative;
    }
    
    /* Kalendersymbol heller und besser sichtbar machen */
    input[type="date"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        filter: invert(0.8) brightness(1.5);
        opacity: 1;
        width: 20px;
        height: 20px;
    }
    
    input[type="date"]::-webkit-calendar-picker-indicator:hover {
        filter: invert(1) brightness(2);
        opacity: 1;
    }
    
    /* Firefox */
    input[type="date"]::-moz-calendar-picker-indicator {
        cursor: pointer;
        filter: invert(0.8) brightness(1.5);
        opacity: 1;
    }
    
    /* Farben für Icons im Status-Modus */
    .custom-input-group.saving .input-status-icon { color: #f59e0b; cursor: wait; }
    .custom-input-group.saved .input-status-icon { color: #10b981; cursor: default; }

    .add-line-btn { color: var(--primary-accent); font-weight: 700; font-size: 11px; background: transparent; border: none; cursor: pointer; padding: 4px 0; display: inline-flex; align-items: center; gap: 4px; opacity: 0.8; }
    .add-line-btn:hover { opacity: 1; text-decoration: underline; }

    /* Dropdown Menü Styles */
    .dropdown-menu {
        max-height: 300px;
        overflow-y: auto;
        overflow-x: hidden;
    }
    
    .dropdown-menu::-webkit-scrollbar { width: 6px; }
    .dropdown-menu::-webkit-scrollbar-track { background: #1e293b; }
    .dropdown-menu::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .dropdown-menu::-webkit-scrollbar-thumb:hover { background: #64748b; }

    /* Admin & Utils */
    .alert-readable { background: rgba(239, 68, 68, 0.15) !important; border: 1px solid #ef4444 !important; color: #fca5a5 !important; }
    .hidden { display: none !important; }
    .text-muted { color: var(--text-soft) !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    div:where(.swal2-container) div:where(.swal2-popup) { border: 1px solid var(--border-dark); background: #1e293b; color: #f1f5f9; }
</style>

<script>
// ===============================================
// MODUL: CORE (Navigation, Globals, Helpers)
// ===============================================

let globalData = {}; 
let globalComments = [];
let globalSearchDebounce = null;
let globalSearchRequestId = 0;
let classRequestToken = {};
let pendingStudentFetch = {};
let commentsLoadingPromise = null;

// Weitere globale Variablen für Teacher-Modul
var pendingStudentFocus = null;
var pendingProposalSaves = {};
var pendingDeletions = new Set();
var STUDENT_PHOTO_PLACEHOLDER = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjOTRhM2I4IiBzdHJva2Utd2lkdGg9IjEuNSI+PGNpcmNsZSBjeD0iMTIiIGN5PSI4IiByPSI0Ii8+PHBhdGggZD0iTTYgMjF2LTJhNCA0IDAgMCAxIDQtNGg0YTQgNCAwIDAgMSA0IDR2MiIvPjwvc3ZnPg==';
var loadedPhotos = new Map();

// Hilfsfunktion: Text sicher für HTML konvertieren
function escapeHtml(input) {
  if (input === null || input === undefined) return '';
  return String(input)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// --- INITIALISIERUNG ---
document.addEventListener('DOMContentLoaded', function() {
  console.log("App gestartet");
  var _appRunning = false;

  const startApp = function(user) {
    if (!user) { _appRunning = false; return; }
    if (_appRunning) return;
    _appRunning = true;
    const authBar = document.getElementById('auth-bar');
    const authEmail = document.getElementById('auth-user-email');
    if (authBar) authBar.style.display = 'flex';
    if (authEmail) authEmail.textContent = user.email || '';
    runServer('getAdminInitData', null).catch(err => {
      console.log('Admin preload nicht kritisch:', err);
    });
    switchView('teacher');
  };

  if (typeof window.onAuthStateReady === 'function') {
    window.onAuthStateReady(startApp);
  } else {
    startApp(null);
  }

  // Fallback: direktes Firebase-Abo, damit startApp auch nach Popup-Login
  // aufgerufen wird, wenn onAuthStateReady-Callbacks bereits geleert wurden.
  if (typeof firebase !== 'undefined' && firebase.auth) {
    firebase.auth().onAuthStateChanged(function(user) {
      startApp(user || null);
    });
  }
  // Kommentare werden erst geladen, wenn sie benötigt werden (lazy loading)
});

function normalizeCommentsList(data) {
  return (Array.isArray(data) ? data : []).map(c => {
    const category = c.category || c.kategorie || c.Kategorie || 'Allgemein';
    let num = c.num || null;
    if (!num && c.text) {
      const text = c.text.toLowerCase().replace(/\s+/g, ' ');
      if (text.includes("konzentrieren")) num = "001";
      else if (text.includes("sorgfältig erledigen") || text.includes("sorgfältig zu erledigen")) num = "002";
      else if (text.includes("lernerfolg")) num = "003";
      else if (text.includes("teamarbeit")) num = "004";
      else if (text.includes("mappenführung einhalten")) num = "008";
      else if (text.match(/hausaufgaben.*sorgfältig/)) num = "009";

async function switchView(view) {
  // Aktiven Tab setzen
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  
  if (view === 'admin') {
    // Bootstrap Modal verwenden - KEIN SweetAlert mehr!
    const modal = new bootstrap.Modal(document.getElementById('adminLoginModal'));
    const passwordInput = document.getElementById('adminPasswordInput');
    const loginBtn = document.getElementById('adminLoginBtn');
    const errorDiv = document.getElementById('adminPasswordError');
    const closeBtn = document.getElementById('adminModalCloseBtn');
    
    // Reset
    passwordInput.value = '';
    errorDiv.style.display = 'none';
    loginBtn.disabled = false;
    
    // Modal öffnen
    modal.show();
    
    // Focus auf Passwort-Feld
    setTimeout(() => passwordInput.focus(), 300);
    
    // Enter-Taste im Passwort-Feld
    const enterHandler = (e) => {
      if (e.key === 'Enter') loginBtn.click();
    };
    passwordInput.addEventListener('keypress', enterHandler);
    
    // Login-Button Click
    const loginHandler = async () => {
      const password = passwordInput.value;
      
      if (!password) {
        errorDiv.textContent = 'Bitte Passwort eingeben';
        errorDiv.style.display = 'block';
        return;
      }
      
      // Button deaktivieren während Prüfung
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Prüfe...';
      
      try {
        const isValid = await runServer('verifyAdminPassword', password);
        
        if (isValid) {
          // SOFORT Modal schließen und UI anzeigen (kein Warten auf Server-Calls!)
          modal.hide();
          document.getElementById('nav-admin').classList.add('active');
          
          // Admin-View sofort mit Lade-Spinner anzeigen (nicht blockierend!)
          const appContent = document.getElementById('app-content');
          appContent.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div><p class="mt-3 text-muted">Lade Admin-Bereich...</p></div>';
          
          // Echtes Admin-Interface asynchron im Hintergrund laden
          setTimeout(() => renderAdminView(appContent), 10);
          
        } else {
          // Fehler anzeigen
          errorDiv.textContent = 'Falsches Passwort!';
          errorDiv.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Anmelden';
          passwordInput.select();
        }
      } catch (error) {
        errorDiv.textContent = 'Fehler: ' + error;
        errorDiv.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Anmelden';
      }
    };
    
    loginBtn.addEventListener('click', loginHandler, { once: true });
    
    // Cleanup wenn Modal geschlossen wird
    document.getElementById('adminLoginModal').addEventListener('hidden.bs.modal', () => {
      passwordInput.removeEventListener('keypress', enterHandler);
      // Wenn Modal ohne Erfolg geschlossen -> zurück zu Lehrer
      if (!document.getElementById('nav-admin').classList.contains('active')) {
        document.getElementById('nav-teacher').classList.add('active');
      }
    }, { once: true });
    
    return; // Wichtig: Nicht weiter ausführen
    
  } else if (view === 'teacher') {
    // Lehrer Bereich (Kein Passwort)
    document.getElementById('nav-teacher').classList.add('active');
    renderTeacherView(document.getElementById('app-content'));
  }
}

<script>
// ProposalsCore: zentrale Proposal-Stateverwaltung
// - Single source of truth für Proposal-State (in-memory + localStorage)
// - Saubere API: list, addOptimistic, confirmServerMap, deleteProposal, persist/load cache
// - Events: subscribe(callback) -> callback(changeType, payload)

(function(){
  const CACHE_PREFIX = 'class_cache_';
  const state = {
    studentsByClass: {}, // { className: [{ id, vorname, proposals: [...] }, ...] }
    optimistic: {}, // { className: { studentId: [proposal, ...] } }
    subscribers: new Set(),
  };

  function notify(type, payload){
    state.subscribers.forEach(cb=>{ try{ cb(type, payload); }catch(e){ console.error('subscriber error', e); } });
  }

  function loadCache(className){
    try{
      const key = CACHE_PREFIX + encodeURIComponent(className);
      const raw = localStorage.getItem(key);
      if(!raw) return null;
      const parsed = JSON.parse(raw);
      return parsed;
    }catch(e){ return null; }
  }

  function persistCache(className){
    try{
      const key = CACHE_PREFIX + encodeURIComponent(className);
      const students = (state.studentsByClass[className] || []).map(s=>({ ...s, proposals: Array.isArray(s.proposals)? s.proposals : [] }));
      const toStore = { className: className, classVersion: null, students: students, phase: (window.globalData && globalData.phase) || '' };
      localStorage.setItem(key, JSON.stringify(toStore));
      return true;
    }catch(e){ console.error('[ProposalsCore] persistCache failed', e); return false; }
  }

  function setStudentsForClass(className, students){
    state.studentsByClass[className] = (students||[]).map(s=>({ ...(s||{}), proposals: Array.isArray(s.proposals)? s.proposals.slice(): [] }));
    notify('studentsUpdated', { className });
  }

  function mergeServerMap(map){
    // map: { studentId: [proposal] }
    Object.keys(map||{}).forEach(sid=>{
      const serverProps = Array.isArray(map[sid])? map[sid].slice() : [];
      // Find class for this student
      const cls = findClassForStudent(sid);
      if(!cls) return; // unknown student in our view
      const students = state.studentsByClass[cls] || [];
      const stu = students.find(s=>String(s.id) === String(sid));
      if(!stu) return;
      const existing = Array.isArray(stu.proposals)? stu.proposals.slice() : [];
      const existingIds = new Set(existing.map(p=>String(p.id)));
      serverProps.forEach(p=>{ if(!existingIds.has(String(p.id))){ existing.push(p); } });
      stu.proposals = existing;
      // After merging remove matching optimistic entries
      removeMatchingOptimistic(cls, sid, stu.proposals);
      notify('studentProposalsUpdated', { className: cls, studentId: sid });
    });
  }

  function findClassForStudent(studentId){
    const classes = Object.keys(state.studentsByClass||{});
    for(let i=0;i<classes.length;i++){
      const cls = classes[i];
      const list = state.studentsByClass[cls]||[];
      if(list.find(s=>String(s.id) === String(studentId))) return cls;
    }
    return null;
  }

  function getProposals(className, studentId){
    const students = state.studentsByClass[className] || [];
    const stu = students.find(s=>String(s.id) === String(studentId));
    const serverList = stu && Array.isArray(stu.proposals) ? stu.proposals.slice() : [];
    const optimistic = (state.optimistic[className] && state.optimistic[className][studentId]) || [];
    const normalized = new Set((serverList||[]).map(p=>String((p.text||'').trim().toLowerCase())));
    const filteredOpt = (optimistic||[]).filter(o=> !normalized.has(String((o.text||'').trim().toLowerCase())));
    return [].concat(serverList, filteredOpt);
  }

  function addOptimistic(className, studentId, proposal){
    state.optimistic[className] = state.optimistic[className] || {};
    state.optimistic[className][studentId] = state.optimistic[className][studentId] || [];
    state.optimistic[className][studentId].push(proposal);
    notify('optimisticAdded', { className, studentId, proposal });
    persistCache(className);
  }

  function removeMatchingOptimistic(className, studentId, serverProposals){
    if(!state.optimistic[className] || !state.optimistic[className][studentId]) return;
    const serverMap = new Set((serverProposals||[]).map(p=>String((p.text||'').trim().toLowerCase()) + ':::' + String((p.creator||'').toLowerCase())));
    const keep = [];
    state.optimistic[className][studentId].forEach(opt=>{
      const key = String((opt.text||'').trim().toLowerCase()) + ':::' + String((opt.creator||'').toLowerCase());
      if(!(serverMap.has(key) && String(opt.id||'').startsWith('temp-'))){ keep.push(opt); }
    });
    state.optimistic[className][studentId] = keep;
    if(state.optimistic[className][studentId].length===0) delete state.optimistic[className][studentId];
    if(Object.keys(state.optimistic[className]||{}).length===0) delete state.optimistic[className];
    notify('optimisticPruned', { className, studentId });
    persistCache(className);
  }

  function confirmServerMap(map){
    mergeServerMap(map);
    // persist merged view
    Object.keys(state.studentsByClass||{}).forEach(cls=> persistCache(cls));
    notify('serverConfirmed', { map });
  }

  function deleteProposal(proposalId){
    // delete both from optimistic and server lists in memory
    // If proposalId starts with temp- -> just remove from optimistic
    if(String(proposalId||'').startsWith('temp-')){
      Object.keys(state.optimistic||{}).forEach(cls => {
        Object.keys(state.optimistic[cls]||{}).forEach(sid => {
          state.optimistic[cls][sid] = state.optimistic[cls][sid].filter(p=> String(p.id)!==String(proposalId));
          if(state.optimistic[cls][sid].length===0) delete state.optimistic[cls][sid];
        });
        if(Object.keys(state.optimistic[cls]||{}).length===0) delete state.optimistic[cls];
      });
      notify('deleted', { proposalId });
      return Promise.resolve({ success: true, local:true });
    }

    // Otherwise perform server-side delete (caller should call TeacherController.deleteProposal)
    return new Promise((resolve, reject)=>{
      try{
        google.script.run.withSuccessHandler(function(newData){
          // merge server response if provided
          if(newData && newData.proposalsByStudent) confirmServerMap(newData.proposalsByStudent);
          notify('deleted', { proposalId, server:true });
          resolve(newData || { success:true });
        }).withFailureHandler(function(err){
          console.error('[ProposalsCore] deleteProposal server error', err);
          reject(err);
        }).deleteProposal(proposalId);
      }catch(e){ reject(e); }
    });
  }

  function subscribe(cb){ state.subscribers.add(cb); return ()=> state.subscribers.delete(cb); }
  function getState(){ return state; }

  // Expose API
  window.ProposalsCore = {
    loadCache,
    persistCache,
    setStudentsForClass,
    getProposals,
    addOptimistic,
    removeMatchingOptimistic,
    confirmServerMap,
    deleteProposal,
    subscribe,
    getState
  };

  console.debug('[ProposalsCore] initialized');
})();
</script>

const ProposalsModule = (function(){
  const optimisticProposals = {};
  const optimisticIndex = {};

  const pendingRemovalTimers = {};

  // Lightweight instrumentation helper

  }

  function normalize(t){ return String(t||'').replace(/\s+/g,' ').trim().toLowerCase(); }
  function creatorKey(c){ return String(c||'').split('@')[0].toLowerCase().trim(); }

    if(!className || !studentId) return;
    optimisticProposals[className] = optimisticProposals[className] || {};
    optimisticProposals[className][studentId] = optimisticProposals[className][studentId] || [];
    optimisticProposals[className][studentId].push(proposal);
    console.debug('[PM] addOptimistic', {className, studentId, id: proposal.id});
  }

  function clearPendingTimeout(tempId){ try{ if(!tempId) return; const t = pendingSaveTimeouts[tempId]; if(t) clearTimeout(t); delete pendingSaveTimeouts[tempId]; } catch(e){} }

    const entry = optimisticIndex[tempId]; if(!entry) return; const { className, studentId } = entry;

      const serverStudent = (globalData && globalData.studentsByClass && globalData.studentsByClass[className]) ? globalData.studentsByClass[className].find(s=>s.id==studentId) : { proposals: [] };

    const idx = arr.findIndex(x=>x.id===tempId); if(idx===-1) return; const old = arr[idx]; arr.splice(idx,1); clearPendingTimeout(tempId); delete optimisticIndex[tempId];
    const newTempId = 'temp-' + Date.now() + '-' + Math.random().toString(36).slice(2);
    const newOpt = { id:newTempId, text:text, creator: old.creator || globalData.userEmail || 'ich', canDelete:true, _temp:true };
    arr.push(newOpt); optimisticIndex[newTempId] = { className, studentId, text, creator: newOpt.creator };

      const matchedServerId = serverMap.get(key);
      const textMatch = serverTextSet.has(normalize(opt.text));

      if ((matchedServerId && String(opt.id).startsWith('temp-')) || (textMatch && String(opt.id).startsWith('temp-'))) {
        // Sofort entfernen, da jetzt persistent (either by creator+text match or text-only match)
        clearPendingTimeout(opt.id);
        delete optimisticIndex[opt.id];
        if(pendingRemovalTimers[opt.id]) { clearTimeout(pendingRemovalTimers[opt.id]); delete pendingRemovalTimers[opt.id]; }
        removedTempIds.push(opt.id);
        instr('tempRemoved', { tempId: opt.id, serverId: matchedServerId || '(text-match)' });
      } else {
        // Timer ggf. abbrechen
        if(opt.id && pendingRemovalTimers[opt.id]){ clearTimeout(pendingRemovalTimers[opt.id]); delete pendingRemovalTimers[opt.id]; }
        remaining.push(opt);
      }
    });
    optimisticProposals[className][studentId] = remaining;
    if(optimisticProposals[className][studentId] && optimisticProposals[className][studentId].length===0) delete optimisticProposals[className][studentId];
    if(Object.keys(optimisticProposals[className]||{}).length===0) delete optimisticProposals[className];
    // Also remove these temp IDs from globalData student proposals if present
    try {
      if (removedTempIds.length > 0 && globalData && globalData.studentsByClass && globalData.studentsByClass[className]) {
        const stud = globalData.studentsByClass[className].find(s => String(s.id) === String(studentId));
        if (stud && Array.isArray(stud.proposals)) {
          stud.proposals = stud.proposals.filter(p => !removedTempIds.includes(String(p.id)));
        }
      }
    } catch (e) { console.error('Error removing temp IDs from globalData proposals:', e); }
    instr('removeMatchingOptimistic END', { removedTempIds, remainingOptimistic: (optimisticProposals[className]&&optimisticProposals[className][studentId])? optimisticProposals[className][studentId].length:0 });
    // Nach dem Entfernen sofort neu rendern
    try {
      const cell = document.getElementById(`proposals-cell-${studentId}`);
      const updatedStudent = (globalData && globalData.studentsByClass && globalData.studentsByClass[className]) ? globalData.studentsByClass[className].find(s=>s.id==studentId) : null;
      if(cell) cell.innerHTML = ProposalsModule.getProposalListHtml(updatedStudent||{proposals:[], id: studentId, klasse: className});
    } catch(e){}
  }

  function mergeOptimisticStudents(className, students){
    if(!className || !students || !optimisticProposals[className]) return students;
    const overrides = optimisticProposals[className];
    return students.map(s=>{
      const extra = overrides[s.id]; if(!extra || extra.length===0) return s; 
      const clone = {...s, proposals: Array.isArray(s.proposals)?[...s.proposals]:[]}; 
      
      // Build a map of server proposals by normalized text+creator
      const serverMap = new Map();
      clone.proposals.forEach(sp => {
        const key = `${normalize(sp.text)}:::${creatorKey(sp.creator)}`;
        serverMap.set(key, sp.id);
      });
      
      // For each optimistic proposal:
      // - If matching server proposal exists (same text+creator), REMOVE the optimistic (it's now on server)
      // - If NO matching, ADD the optimistic (it's pending)
      extra.forEach(opt=>{ 
        const key = `${normalize(opt.text)}:::${creatorKey(opt.creator)}`;
        const hasMatching = serverMap.has(key);
        
        if(!hasMatching) {
          // No matching server proposal: add optimistic if not already present by ID
          if(!clone.proposals.find(p=>p.id===opt.id)) {
            clone.proposals.push(opt);
          }
        }
        // If hasMatching: skip adding (server version already in proposals)
      }); 
      
      return clone;
    });
  }

  function getProposalListHtml(s){
    if(!s) return '';
    const className = s.klasse || s._className || '';
    const studentId = s.id;
    const serverList = Array.isArray(s.proposals) ? s.proposals : [];
    const optimistic = (optimisticProposals[className] && optimisticProposals[className][studentId]) || [];

    // Merge serverList + optimistic deterministically and dedupe by normalized text+creator
    const combined = [];
    const seen = new Set();
    const keyOf = p => `${normalize(p.text)}:::${creatorKey(p.creator)}`;

    // Add server proposals first (prefer server entries)
    serverList.forEach(p => {
      const k = keyOf(p);
      if (!seen.has(k)) { combined.push(p); seen.add(k); }
    });

    // Then add optimistic proposals only if not already present
    optimistic.forEach(p => {
      const k = keyOf(p);
      if (!seen.has(k)) { combined.push(p); seen.add(k); }
    });

    if (!combined || combined.length === 0) return '';
    return combined.filter(p=>true).map(p=>{
      const isTemp = Boolean(p._temp) || String(p.id||'').startsWith('temp-');
      // Löschen-Icon nur für echte Vorschläge (keine temp-IDs)
      const deleteBtn = (p.canDelete && !isTemp) ? `<i class="fa-solid fa-trash-can text-danger ms-2" style="cursor:pointer; opacity:0.7;" onclick="ProposalsModule.deleteProposalWithLog('${p.id}','${studentId}','${className}')" title="Löschen"></i>` : '';
      const tempBadge = isTemp ? `<span class="badge bg-secondary ms-2" style="font-size:0.65rem;">wird gespeichert..</span>` : '';
      const failedBadge = p._failed ? `<button class="btn btn-sm btn-outline-danger ms-2" onclick="ProposalsModule.retryTempProposal('${p.id}')">Speichern fehlgeschlagen – erneut</button>` : '';
      // Gespeichert-Badge nur für echte Vorschläge, die gerade frisch gespeichert wurden
      const savedBadge = (!isTemp && p._justSaved) ? `<span id="saved-badge-${p.id}" class="badge bg-success ms-2" style="font-size:0.65rem; display:none;">gespeichert</span>` : '';
      return `\n       <div id="prop-row-${p.id}" class="existing-proposal-box fade-in-row">\n         <div style="flex:1;">\n           <i class="fa-solid fa-quote-left quote-icon"></i> ${escapeHtml(p.text||'')}\n         </div>\n         <div class="d-flex align-items-center flex-shrink-0 ms-2">\n           <span class="user-badge">${escapeHtml((p.creator||'').split('@')[0])}</span>\n           ${tempBadge}\n           ${failedBadge}\n           ${savedBadge}\n           ${deleteBtn}\n         </div>\n       </div>`;
    }).join('');
  }

  function getVotingProposalsHtml(s) {

      const votersNeg = Array.isArray(p.votersNeg) ? p.votersNeg : [];
      
      const upActive = myVote === 1 ? 'btn-success' : 'btn-outline-secondary';

      const votersPosStr = votersPos.map(v => v.split('@')[0]).join(', ');

  function autoSaveProposal(inputElement){
    // replicate lighter-weight save flow: validate, optimistic push, server call, timeouts
    const text = (inputElement.value||'').trim(); if(!text) return; const validation = (typeof validateProposalText==='function')? validateProposalText(text) : { valid: true };
    const classNameForLog = (document.getElementById('class-select')||{}).value || '';
    console.debug('[PM] autoSaveProposal start', { className: classNameForLog, text });
    if(!validation.valid){ if(typeof showFieldError==='function') showFieldError(inputElement, validation.message||'Invalid'); return; }
    const studentId = inputElement.dataset.studentid; const tempId = 'temp-'+Date.now();
    const selectEl = document.getElementById('class-select') || document.querySelector('select'); const currentClass = selectEl? selectEl.value : '';
    const studentList = globalData.studentsByClass ? globalData.studentsByClass[currentClass] : null; const student = studentList ? studentList.find(s=>s.id==studentId) : null;
    if(student){ if(!Array.isArray(student.proposals)) student.proposals = []; student.proposals.push({ id: tempId, text:text, creator: globalData.userEmail || 'ich', canDelete:true, _temp:true }); const cell = document.getElementById(`proposals-cell-${studentId}`); if(cell) cell.innerHTML = ProposalsModule.getProposalListHtml(student); }
    addOptimisticProposal(currentClass, studentId, { id: tempId, text:text, creator: globalData.userEmail || 'ich', canDelete:true, _temp:true });
    optimisticIndex[tempId] = { className: currentClass, studentId, text, creator: globalData.userEmail || 'ich' };
    // Increase timeout to allow slower backend responses (20s)
    pendingSaveTimeouts[tempId] = setTimeout(()=>markProposalFailed(tempId), 20000);

    const payload = [{ studentId: studentId, text: text, className: currentClass, clientKey: tempId }];
    google.script.run.withSuccessHandler(newData=>{
      console.debug('[PM][DEBUG] SuccessHandler called, newData:', newData, 'tempId:', tempId, 'currentClass:', currentClass);
      // Normalize possible wrapper shape: some server calls return { newData: {...}, tempId:..., ... }
      let resp = newData;
      try { if (resp && resp.newData) resp = resp.newData; } catch (e) { /* ignore */ }
      if(resp==null){ console.error('PM save returned null'); if(student){ student.proposals = (student.proposals||[]).filter(p=>p.id!==tempId); const cell = document.getElementById(`proposals-cell-${studentId}`); if(cell) cell.innerHTML = ProposalsModule.getProposalListHtml(student); } return; }
      if(resp.success===false){ if(student){ student.proposals = (student.proposals||[]).filter(p=>p.id!==tempId); const cell = document.getElementById(`proposals-cell-${studentId}`); if(cell) cell.innerHTML = ProposalsModule.getProposalListHtml(student); } if(typeof showFieldError==='function') showFieldError(inputElement, (resp.errors && resp.errors[0] && resp.errors[0].reason) || resp.message || 'Server validation'); return; }

      // Handle both formats: studentsByClass (legacy) or proposalsByStudent (V2)
      const hasLegacyFormat = resp && resp.studentsByClass && resp.studentsByClass[currentClass];
      const hasV2Format = resp && resp.proposalsByStudent && resp.proposalsByStudent[studentId];
      
      if(hasLegacyFormat || hasV2Format){
        console.debug('[PM][DEBUG] Server response:', {newData, tempId, currentClass, studentId});
        console.debug('[PM][DEBUG] Format detected:', hasLegacyFormat ? 'legacy' : 'V2');
        
        // SIMPLIFIED FIX: Call applyServerData ONCE with the correct format
        if(typeof applyServerData==='function') {
          if(hasLegacyFormat) {
            // Use legacy format directly from server
            applyServerData(newData);
          } else if(hasV2Format) {
            // Convert V2 format to legacy format
            // Get existing students for this class or create minimal structure
            const existingStudents = (globalData.studentsByClass && globalData.studentsByClass[currentClass]) || [];
            const updatedStudents = existingStudents.map(s => {
              if(String(s.id) === String(studentId)) {
                // Update this student's proposals
                return { ...s, proposals: newData.proposalsByStudent[studentId] || [] };
              }
              return s;
            });
            
            // If student not found in existing, add them
            if(!existingStudents.find(s => String(s.id) === String(studentId))) {
              updatedStudents.push({
                id: studentId,
                proposals: newData.proposalsByStudent[studentId] || []
              });
            }
            
            const legacyFormat = {
              studentsByClass: {
                [currentClass]: updatedStudents
              },
              phase: newData.phase,
              phaseDescription: newData.phaseDescription
            };
            applyServerData(legacyFormat);
          }
        }
        
        // NOTE: Do NOT remove the optimistic temp-entry yet — wait until we confirm
        // that the server returned a persistent proposal matching this text/creator.
        // We will remove the temp entry after attempting to reconcile below.
        
        // Remove any server-returned proposals that still have temp-IDs (artifacts)
        try {
          const classStudents = globalData.studentsByClass && globalData.studentsByClass[currentClass];
          if (Array.isArray(classStudents)) {
            classStudents.forEach(st => {
              if (Array.isArray(st.proposals)) {
                const before = st.proposals.length;
                st.proposals = st.proposals.filter(p => !String(p.id || '').startsWith('temp-'));
                if (st.proposals.length !== before) console.debug('[PM] Removed server-side temp proposals from class data for student', st.id);
              }
            });
          }
        } catch(e) { console.error('Error cleaning server temp proposals', e); }

        // Get proposals for matching (from globalData after update)
        const updatedStudent = globalData.studentsByClass && globalData.studentsByClass[currentClass] && globalData.studentsByClass[currentClass].find(s=>s.id==studentId);
        const serverProps = (updatedStudent && Array.isArray(updatedStudent.proposals)) ? updatedStudent.proposals : [];
          
        console.debug('[PM][DEBUG] Vorschläge nach Server-Update:', {studentId, serverProps});
        // Deterministic reconciliation: if server returned a clientKeyMap, replace temp-ID with server-ID
        try {
          // clientKeyMap may live on the top-level resp or be wrapped; check both
          const clientKeyMap = (newData && (newData.clientKeyMap || (newData.newData && newData.newData.clientKeyMap))) || (resp && resp.clientKeyMap) || {};
          if (clientKeyMap && clientKeyMap[tempId]) {
            const serverIdForTemp = clientKeyMap[tempId];
            // Clear pending timeouts and indexes for temp
            try { clearPendingTimeout(tempId); } catch (e) {}
            try { delete optimisticIndex[tempId]; } catch (e) {}
            try {
              if (optimisticProposals[currentClass] && optimisticProposals[currentClass][studentId]) {
                optimisticProposals[currentClass][studentId] = optimisticProposals[currentClass][studentId].filter(o => String(o.id) !== String(tempId));
                if (optimisticProposals[currentClass][studentId].length === 0) delete optimisticProposals[currentClass][studentId];
                if (Object.keys(optimisticProposals[currentClass]||{}).length===0) delete optimisticProposals[currentClass];
              }
            } catch(e){}

            // Replace temp ID in globalData if present and mark server entry as justSaved
            try {
              const stud = globalData.studentsByClass && globalData.studentsByClass[currentClass] && globalData.studentsByClass[currentClass].find(s => String(s.id) === String(studentId));
              if (stud && Array.isArray(stud.proposals)) {
                stud.proposals.forEach(p=>{
                  if (String(p.id) === String(tempId)) {
                    p.id = serverIdForTemp;
                    p._temp = false;
                    p._justSaved = true;
                  }
                });
              }
              // Ensure serverProps includes the server entry
              if (serverProps && !serverProps.find(p=>String(p.id)===String(serverIdForTemp))) {
                serverProps.push({ id: serverIdForTemp, text: text, creator: globalData.userEmail || '', _justSaved: true });
              }
            } catch(e) { console.error('Error applying clientKeyMap reconciliation', e); }
          }
        } catch(e) { console.error('ClientKey reconciliation error', e); }

        // Finde den Vorschlag mit gleichem Text und Creator, aber echter ID (robuster Abgleich)
        const tempText = normalize(text);
        const tempCreator = String((globalData.userEmail || 'ich')).toLowerCase();
        let justSavedId = null;
        serverProps.forEach(p => {
          if(normalize(p.text) === tempText && String(p.creator||'').toLowerCase() === tempCreator) {
            p._justSaved = true;
            justSavedId = p.id;
          }
        });
        if(!justSavedId) {
          console.warn('[PM][DEBUG] Kein justSavedId gefunden!', {tempText, tempCreator, serverProps});
        }
        console.debug('[PM][DEBUG] Calling removeMatchingOptimistic with:', {currentClass, studentId, serverPropsCount: serverProps.length});
        ProposalsModule.removeMatchingOptimistic(currentClass, studentId, serverProps);
        
        const cell = document.getElementById(`proposals-cell-${studentId}`);
        const finalStudent = globalData.studentsByClass && globalData.studentsByClass[currentClass] && globalData.studentsByClass[currentClass].find(s=>s.id==studentId);
          // Merge server + optimistic proposals with de-duplication:
          instr('merge START', { className: currentClass, studentId, serverCount: (finalStudent && Array.isArray(finalStudent.proposals))? finalStudent.proposals.length:0, optimisticCount: ((optimisticProposals[currentClass] && optimisticProposals[currentClass][studentId])||[]).length });
          // - Prefer server (non-temp) proposals
          // - Append optimistic (temp) proposals only if no server equivalent (by normalized text+creator)
          try {
            const merged = [];
            const seen = new Set();
            const keyOf = p => `${normalize(p.text)}:::${creatorKey(p.creator)}`;

            // Add server proposals first (exclude any temp-IDs that slipped through)
            if (finalStudent && Array.isArray(finalStudent.proposals)) {
              finalStudent.proposals.forEach(p => {
                if (String(p.id || '').startsWith('temp-')) return; // skip any temp artifacts
                const k = keyOf(p);
                if (!seen.has(k)) { merged.push(p); seen.add(k); }
              });
            }

            // Then add optimistic proposals if they don't duplicate server entries
            const remainingOptimistic = (optimisticProposals[currentClass] && optimisticProposals[currentClass][studentId]) || [];
            remainingOptimistic.forEach(opt => {
              const k = keyOf(opt);
              if (!seen.has(k)) { merged.push(opt); seen.add(k); }
            });

            // Replace finalStudent proposals with merged, deduped list
            if (finalStudent) finalStudent.proposals = merged;
          } catch (e) { console.error('Error merging/deduping proposals before render:', e); }
          instr('merge END', { mergedCount: (finalStudent && Array.isArray(finalStudent.proposals))? finalStudent.proposals.length:0 });
        if(finalStudent && cell) {
          // Use requestAnimationFrame to avoid render flicker when scrolling
          requestAnimationFrame(() => {
            cell.innerHTML = ProposalsModule.getProposalListHtml(finalStudent);
          });
          // Zeige das "gespeichert"-Badge für 2 Sekunden
          if(justSavedId) showSavedBadge(justSavedId, studentId);
          try{ if(window.ProposalsCore && ProposalsCore.persistCache) ProposalsCore.persistCache(currentClass); }catch(e){}
        }
        // Entferne das Flag nach dem Rendern, damit es beim nächsten Rendern nicht mehr erscheint
        if(justSavedId) {
          setTimeout(()=>{
            const student = globalData.studentsByClass[currentClass].find(s=>s.id==studentId);
            if(student && Array.isArray(student.proposals)) {
              student.proposals.forEach(p=>{ if(p.id===justSavedId) delete p._justSaved; });
            }
          }, 2100);
        }
      }
      else if(currentClass){ const token = Date.now(); pendingStudentFetch[currentClass] = token; google.script.run.withSuccessHandler(data=>{ if(pendingStudentFetch[currentClass]!==token) return; if(!data || data.success===false) return; if(typeof applyServerData==='function') applyServerData({ phase: data.phase, phaseDescription: data.phaseDescription, studentsByClass: { [currentClass]: (data.studentsByClass && data.studentsByClass[currentClass]) || [] } }); const updatedStudent = globalData.studentsByClass[currentClass].find(s=>s.id==studentId); const cell = document.getElementById(`proposals-cell-${studentId}`); if(updatedStudent && cell){ ProposalsModule.removeMatchingOptimistic(currentClass, studentId, updatedStudent.proposals || []); cell.innerHTML = ProposalsModule.getProposalListHtml(updatedStudent); try{ if(window.ProposalsCore && ProposalsCore.persistCache) ProposalsCore.persistCache(currentClass); }catch(e){} } }).withFailureHandler(()=>{}).getStudentsForClass(currentClass); }
    }).withFailureHandler(err=>{ console.error('PM save failed', err); if(student){ student.proposals = (student.proposals||[]).filter(p=>p.id!==tempId); const cell = document.getElementById(`proposals-cell-${studentId}`); if(cell) cell.innerHTML = ProposalsModule.getProposalListHtml(student); } if(typeof showMessage==='function') showMessage('Fehler','Speichern fehlgeschlagen.','error'); }).saveBulkProposals(payload);
  }

  // ProposalsCore is provided by js-proposals-core.html include
  return {

}

function handleStudentSearch(query) {
  const select = document.getElementById('class-select');
  const currentClass = select ? select.value : '';
  if (currentClass) {
    filterStudentsInClass(currentClass, query);
  } else {
    performGlobalStudentSearch(query);
  }
}

function filterStudentsInClass(className, query) {
  const q = String(query || '').toLowerCase().trim();
  const rows = document.querySelectorAll(`.student-row[data-student-id]`);
  rows.forEach(row => {
    if (row.dataset.className && row.dataset.className !== className) {
      // rows from anderen Klassen sind aktuell nicht sichtbar
      row.style.display = '';
      return;
    }
    const name = row.querySelector('.student-name')?.innerText.toLowerCase() || '';
    const firstname = row.querySelector('.student-firstname')?.innerText.toLowerCase() || '';
    if (!q || name.includes(q) || firstname.includes(q)) {
      row.style.display = '';
    } else {
      row.style.display = 'none';
    }
  });
}

function performGlobalStudentSearch(query) {
  const listArea = document.getElementById('student-list-area');
  if (!listArea) return;

  const trimmed = String(query || '').trim();
  if (globalSearchDebounce) {
    clearTimeout(globalSearchDebounce);
    globalSearchDebounce = null;
  }

  if (!trimmed) {
    globalSearchRequestId++;
    listArea.innerHTML = '<div class="search-hint-card">Bitte eine Klasse auswählen oder mindestens 2 Zeichen eingeben, um zu suchen.</div>';
    return;
  }

  if (trimmed.length < 2) {
    globalSearchRequestId++;
    listArea.innerHTML = '<div class="search-hint-card">Bitte mindestens 2 Zeichen eingeben.</div>';
    return;
  }

  const requestId = ++globalSearchRequestId;
  listArea.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary"></div><p class="text-muted mt-2">Durchsuche alle Klassen...</p></div>';

  const searchTerm = trimmed;
  globalSearchDebounce = setTimeout(() => {
    globalSearchDebounce = null;
    google.script.run
      .withSuccessHandler(res => {
        if (requestId !== globalSearchRequestId) return;
        if (!res || res.success === false) {
          const errMsg = (res && res.error) ? res.error : 'Unbekannter Fehler';
          listArea.innerHTML = `<div class="alert alert-danger">Suche fehlgeschlagen: ${errMsg}</div>`;
          return;
        }
        renderGlobalSearchResults(res.results || [], searchTerm, !!res.limited, res.totalMatches || (res.results || []).length);
      })
      .withFailureHandler(err => {
        if (requestId !== globalSearchRequestId) return;
        listArea.innerHTML = `<div class="alert alert-danger">Verbindungsfehler: ${err}</div>`;
      })
      .searchStudentsAcrossClasses(searchTerm, 25);
  }, 250);
}

// Throttle helper
function throttle(fn, wait){
  let last = 0, timeout = null;
  return function(){
    const now = Date.now();
    const args = arguments;
    const later = function(){ last = Date.now(); timeout = null; fn.apply(null, args); };
    if(now - last >= wait){ last = now; fn.apply(null, args); }
    else if(!timeout){ timeout = setTimeout(later, wait - (now - last)); }
  };
}

// Photo lazy-load using IntersectionObserver
let _photoObserver = null;
function initPhotoObserver(){
  try{
    if(typeof IntersectionObserver === 'undefined') return;
    // Always (re)create observer so its root is the current virtual-list wrapper
    try { if(_photoObserver) { _photoObserver.disconnect(); _photoObserver = null; } } catch(e) {}

    const rootEl = document.querySelector('.virtual-list') || null;
    _photoObserver = new IntersectionObserver(entries => {
      entries.forEach(ent => {
        if(!ent.isIntersecting) return;
        const img = ent.target;
        const src = img.dataset && img.dataset.src;
        if(src){ img.src = src; }
        try { _photoObserver.unobserve(img); } catch(e) {}
      });
    }, { root: rootEl, rootMargin: '200px' });

    // observe any currently rendered images inside the root (or whole document if no root)
    const toObserve = rootEl ? rootEl.querySelectorAll('img.photo-lazy') : document.querySelectorAll('img.photo-lazy');
    toObserve.forEach(img => { if(img.dataset && img.dataset.src) _photoObserver.observe(img); });
  }catch(e){ console.error('initPhotoObserver failed', e); }
}

  listArea.innerHTML = html;
}

// Voting handler used by ProposalsModule.getVotingProposalsHtml
function castVoteUI(proposalId, studentId, voteValue) {
  try {
    const myVotes = globalData.myVotes || {};
    const currentVote = myVotes[proposalId] || 0;

    // Toggle behaviour: clicking same vote again removes it
    let newVote = voteValue;
    if (currentVote === voteValue) newVote = 0;

    // Optimistic UI update
    myVotes[proposalId] = newVote;
    globalData.myVotes = myVotes;

    const selectEl = document.getElementById('class-select');
    const currentClass = selectEl ? selectEl.value : '';
    const students = (globalData.studentsByClass && globalData.studentsByClass[currentClass]) || [];
    const student = students.find(s => String(s.id) === String(studentId));
    // Optimistisch Zähler anpassen
    if (student) {
      const p = student.proposals.find(pp => String(pp.id) === String(proposalId));
      if (p) {
        const pos = Number(p.positiveCount || p.pos || 0);
        const neg = Number(p.negativeCount || p.neg || 0);
        let newPos = pos, newNeg = neg;
        // remove previous vote effect
        if (currentVote === 1) newPos -= 1;
        if (currentVote === -1) newNeg -= 1;
        // apply new vote effect
        if (newVote === 1) newPos += 1;
        if (newVote === -1) newNeg += 1;
        p.positiveCount = Math.max(0, newPos);
        p.negativeCount = Math.max(0, newNeg);
      }
    }
    if (student) {
      const cell = document.getElementById(`proposals-cell-${studentId}`);
      if (cell) cell.innerHTML = getVotingProposalsHtml(student);
    }

    // Server call
    google.script.run
      .withSuccessHandler(res => {
        if (!res || !res.success) {
          console.error('castVote failed:', res);
          showMessage('Fehler', (res && res.error) || 'Abstimmung fehlgeschlagen', 'error');
          return;
        }

        // Update myVotes with authoritative value
        myVotes[proposalId] = res.myVote || 0;
        globalData.myVotes = myVotes;

        // Update proposal counts in globalData
        if (student) {
          const p = student.proposals.find(pp => String(pp.id) === String(proposalId));
          if (p) {
            p.positiveCount = res.pos;
            p.negativeCount = res.neg;
            p.votersPos = res.votersPos ? res.votersPos.split(', ') : [];
            p.votersNeg = res.votersNeg ? res.votersNeg.split(', ') : [];
          }
        }

        // Re-render the proposals cell
        const cell = document.getElementById(`proposals-cell-${studentId}`);
        if (cell && student) cell.innerHTML = getVotingProposalsHtml(student);
      })
      .withFailureHandler(err => {
        console.error('castVote network error:', err);
        showMessage('Fehler', 'Netzwerkfehler: ' + err, 'error');
        // Revert optimistic update
        myVotes[proposalId] = currentVote;
        globalData.myVotes = myVotes;
        const cell = document.getElementById(`proposals-cell-${studentId}`);
        if (cell && student) cell.innerHTML = getVotingProposalsHtml(student);
      })
      .castVote(proposalId, newVote);
  } catch (e) {
    console.error('castVoteUI error', e);
  }
}

function deleteEntry(proposalId) {
  Swal.fire({
    title: 'Löschen?',
    text: 'Eintrag wirklich entfernen?',
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#ef4444',
    cancelButtonColor: '#64748b',
    confirmButtonText: 'Ja, löschen',
    cancelButtonText: 'Abbrechen',
    background: '#1e293b',
    color: '#f1f5f9',
    heightAuto: false
  }).then((result) => {
    if (!result.isConfirmed) return;

    // Optimistic UI: mark as pending deletion and re-render class
    pendingDeletions.add(proposalId);
    const selectEl = document.getElementById('class-select') || document.querySelector('select');
    const currentClass = selectEl ? selectEl.value : '';
    if (currentClass) renderStudentList(currentClass);
    else {
      const row = document.getElementById('prop-row-' + proposalId);
      if (row) { row.style.opacity = '0'; setTimeout(() => row.remove(), 300); }
    }

    // Server call
    google.script.run
      .withSuccessHandler(newData => {
        pendingDeletions.delete(proposalId);
        if (!newData || newData.success === false) {
          console.error('deleteProposal failed', newData);
          const msg = (newData && newData.message) || JSON.stringify(newData) || 'Löschen fehlgeschlagen.';
          showMessage('Fehler', msg, 'error');
          if (currentClass) renderStudentList(currentClass);
          return;
        }
        // Merge server data into globalData while preserving optimistic entries
        applyServerData(newData);
        // Reconcile optimistic entries (clear temp badges/timeouts if server confirmed)
        reconcileAllOptimistic();
        if (currentClass) renderStudentList(currentClass);
      })
      .withFailureHandler(err => {
        pendingDeletions.delete(proposalId);
        console.error('deleteProposal() failed:', err);
        showMessage('Fehler', 'Verbindung zum Server beim Löschen fehlgeschlagen.', 'error');
        if (currentClass) renderStudentList(currentClass);
      })
      .deleteProposal(proposalId);
  });
}

function isDateInRange(checkDate, text) {
  if (!checkDate || !text) return false;
  const regex = /(\d{1,2})\.(\d{1,2})\.(\d{2,4})/g;
  const matches = [...text.matchAll(regex)];
  if (matches.length < 2) return false;
  
  const [d1, m1, y1] = [parseInt(matches[0][1]), parseInt(matches[0][2]), parseInt(matches[0][3])];
  const [d2, m2, y2] = [parseInt(matches[1][1]), parseInt(matches[1][2]), parseInt(matches[1][3])];
  
  const start = new Date(y1 < 100 ? 2000 + y1 : y1, m1 - 1, d1);
  const end = new Date(y2 < 100 ? 2000 + y2 : y2, m2 - 1, d2);
  
  return checkDate >= start && checkDate <= end;
}

function parseGermanDate(dateStr) {
  if (!dateStr) return '';
  const parts = dateStr.split('.');
  if (parts.length !== 3) return '';
  return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
}

function formatToGermanDate(isoDate) {
  if (!isoDate) return '';
  const parts = isoDate.split('-');
  if (parts.length !== 3) return '';
  return `${parts[2]}.${parts[1]}.${parts[0]}`;
}

function initializeDatePickers(proposalDesc, votingDesc) {
  const propMatch = proposalDesc.match(/(\d{2}\.\d{2}\.\d{4})\s*-\s*(\d{2}\.\d{2}\.\d{4})/);
  if (propMatch) {
    const propStart = document.getElementById('propStartDate');
    const propEnd = document.getElementById('propEndDate');
    if (propStart) propStart.value = parseGermanDate(propMatch[1]);
    if (propEnd) propEnd.value = parseGermanDate(propMatch[2]);
  }
  
  const voteMatch = votingDesc.match(/(\d{2}\.\d{2}\.\d{4})\s*-\s*(\d{2}\.\d{2}\.\d{4})/);
  if (voteMatch) {
    const voteStart = document.getElementById('voteStartDate');
    const voteEnd = document.getElementById('voteEndDate');
    if (voteStart) voteStart.value = parseGermanDate(voteMatch[1]);
    if (voteEnd) voteEnd.value = parseGermanDate(voteMatch[2]);
  }
  
  const propStart = document.getElementById('propStartDate');
  const propEnd = document.getElementById('propEndDate');
  const voteStart = document.getElementById('voteStartDate');
  const voteEnd = document.getElementById('voteEndDate');
  
  function updateProposalText() {
    const start = propStart ? propStart.value : '';
    const end = propEnd ? propEnd.value : '';
    const descProp = document.getElementById('descProp');
    if (!descProp) return;
    
    if (!start && !end) {
      descProp.value = '';
      console.log('[updateProposalText] Beide Felder leer - Textfeld geleert');
      return;
    }
    
    if (start && end) {
      descProp.value = `${formatToGermanDate(start)} - ${formatToGermanDate(end)}`;
      console.log('[updateProposalText] Textfeld aktualisiert:', descProp.value);
    }
  }
  
  function updateVotingText() {
    const start = voteStart ? voteStart.value : '';
    const end = voteEnd ? voteEnd.value : '';
    const descVote = document.getElementById('descVote');
    if (!descVote) return;
    
    if (!start && !end) {
      descVote.value = '';
      console.log('[updateVotingText] Beide Felder leer - Textfeld geleert');
      return;
    }
    
    if (start && end) {
      descVote.value = `${formatToGermanDate(start)} - ${formatToGermanDate(end)}`;
      console.log('[updateVotingText] Textfeld aktualisiert:', descVote.value);
    }
  }
  
  if (propStart) propStart.addEventListener('change', updateProposalText);
  if (propEnd) propEnd.addEventListener('change', updateProposalText);
  if (voteStart) voteStart.addEventListener('change', updateVotingText);
  if (voteEnd) voteEnd.addEventListener('change', updateVotingText);
}

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = (e) => reject(e);
    reader.readAsText(file);
  });
}

function addStudentManually() {
  const vorname = document.getElementById('newStudentVorname').value.trim();
  const nachname = document.getElementById('newStudentNachname').value.trim();
  const klasse = document.getElementById('newStudentKlasse').value.trim();
  const photoFile = document.getElementById('newStudentPhoto').files[0];
  const stat = document.getElementById('addStudentStat');
  
  if (!vorname || !nachname || !klasse) {
    showMessage("Fehler", "Bitte alle Pflichtfelder ausfüllen.", "error");
    return;
  }
  
  stat.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Füge hinzu...';
  
  if (photoFile) {
    readFileAsBase64(photoFile).then(base64Data => {
      return runServer('addStudent', {
        vorname: vorname,
        nachname: nachname,
        klasse: klasse,
        photoData: base64Data,
        photoName: photoFile.name
      });
    })
    .then(handleAddStudentResponse)
    .catch(err => {
      stat.innerHTML = '<span class="text-danger">Fehler</span>';
      showMessage("Fehler", String(err), "error");
    });
  } else {
    runServer('addStudent', {
      vorname: vorname,
      nachname: nachname,
      klasse: klasse
    })
    .then(handleAddStudentResponse)
    .catch(err => {
      stat.innerHTML = '<span class="text-danger">Fehler</span>';
      showMessage("Fehler", String(err), "error");
    });
  }
}

function handleAddStudentResponse(res) {
  const stat = document.getElementById('addStudentStat');
  if (res && res.success) {
    stat.innerHTML = '<span class="text-success">✅ Hinzugefügt!</span>';
    document.getElementById('newStudentVorname').value = '';
    document.getElementById('newStudentNachname').value = '';
    document.getElementById('newStudentKlasse').value = '';
    document.getElementById('newStudentPhoto').value = '';
    showMessage("Erfolg", res.message || "Schüler hinzugefügt.", "success");
  } else {
    stat.innerHTML = '<span class="text-danger">❌ Fehler</span>';
    showMessage("Fehler", res && res.message ? res.message : "Unbekannter Fehler", "error");
  }
}

function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = (e) => reject(e);
    reader.readAsDataURL(file);
  });
}

let selectedStudentIds = new Set();

function loadStudentsForManagement() {
  const list = document.getElementById('studentManagementList');
  list.innerHTML = '<div class="text-center py-4"><div class="spinner-border spinner-border-sm"></div> Lade...</div>';

  const timeout = new Promise((_, reject) =>
    setTimeout(() => reject(new Error('Timeout: Server antwortet nicht (>30s). Bitte Seite neu laden und erneut versuchen.')), 30000)
  );

  Promise.race([runServer('getAllStudents', null), timeout])
  .then(result => {
    if (!result || !result.success) {
      const msg = result && result.message ? result.message : 'Unbekannter Fehler';
      list.innerHTML = `<div class="text-danger text-center py-4"><i class="fa-solid fa-circle-exclamation me-2"></i>Fehler: ${msg}</div>`;
      return;
    }
    if (!result.students || result.students.length === 0) {
      list.innerHTML = '<div class="text-center text-muted py-4">Keine Schüler gefunden</div>';
      return;
    }

    selectedStudentIds.clear();

    let html = '<div class="d-flex flex-column gap-2">';
    result.students.forEach(s => {
      const checkId = `check-${s.id}`;
      html += `
        <div class="d-flex align-items-center p-2 rounded border border-secondary bg-dark">
          <input type="checkbox" class="form-check-input me-3" id="${checkId}"
                 onchange="toggleStudentSelection('${s.id}')">
          <label class="form-check-label flex-grow-1 text-light small" for="${checkId}">
            ${s.klasse} - ${s.nachname}, ${s.vorname}
          </label>
        </div>
      `;
    });
    html += '</div>';

    list.innerHTML = html;

    document.getElementById('selectAllBtn').disabled = false;
    document.getElementById('deselectAllBtn').disabled = false;
  })
  .catch(err => {
    list.innerHTML = `<div class="text-danger text-center py-4"><i class="fa-solid fa-circle-exclamation me-2"></i>${err.message || err}</div>`;
  });
}

function toggleStudentSelection(studentId) {
  const checkbox = document.getElementById('check-' + studentId);
  if (checkbox && checkbox.checked) {
    selectedStudentIds.add(studentId);
  } else {
    selectedStudentIds.delete(studentId);
  }
  
  document.getElementById('deleteProposalsBtn').disabled = selectedStudentIds.size === 0;
  document.getElementById('resetVotesBtn').disabled = selectedStudentIds.size === 0;
}

function selectAllStudents() {
  document.querySelectorAll('#studentManagementList input[type="checkbox"]').forEach(cb => {
    cb.checked = true;
    const id = cb.id.replace('check-', '');
    selectedStudentIds.add(id);

  document.getElementById('deleteProposalsBtn').disabled = false;
  document.getElementById('resetVotesBtn').disabled = false;

function deselectAllStudents() {

function rebuildIndexes() {
  Swal.fire({
    title: 'Index neu aufbauen?',
    text: 'Dies kann einige Minuten dauern.',
    icon: 'question',
    showCancelButton: true,
    confirmButtonColor: '#06b6d4',
    cancelButtonColor: '#64748b',
    confirmButtonText: 'Ja, aufbauen',
    cancelButtonText: 'Abbrechen',
    background: '#1e293b',
    color: '#f1f5f9'
  }).then((result) => {
    if (result.isConfirmed) {
      runServer('rebuildIndexes', null)
      .then(res => {
        if (res && res.success) {
          showMessage("Erfolg", "Index wurde neu aufgebaut.", "success");
        } else {
          showMessage("Fehler", res && res.message ? res.message : "Unbekannter Fehler", "error");
        }
      })
      .catch(err => {
        showMessage("Fehler", String(err), "error");
      });
    }
  });
}
</script>
